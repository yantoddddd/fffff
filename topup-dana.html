<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Topup Dana - QRIS Auto Gen</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:sans-serif;background:linear-gradient(135deg,#4facfe,#00f2fe);min-height:100vh;padding:20px}
.container{max-width:500px;margin:0 auto;background:white;border-radius:20px;box-shadow:0 20px 40px rgba(0,0,0,.1);position:relative}
.header{position:relative;background:linear-gradient(135deg,#667eea,#764ba2);color:white;padding:30px;text-align:center;border-radius:20px 20px 0 0}
.back-btn{position:absolute;left:20px;top:20px;background:rgba(255,255,255,.2);border:none;color:white;padding:10px 15px;border-radius:50%;font-size:20px;cursor:pointer;transition:all .3s}
.back-btn:hover{background:rgba(255,255,255,.3);transform:scale(1.1)}
h1{font-size:2em;margin:0}
.subtitle{font-size:16px;opacity:.9;margin-top:5px}
.content{padding:30px;text-align:center}
.topup-card{background:linear-gradient(135deg,#ffecd2,#fcb69f);padding:30px;border-radius:20px;margin:20px 0;box-shadow:0 10px 30px rgba(0,0,0,.1)}
.topup-input-group{position:relative;margin:30px 0}
label{display:block;margin-bottom:15px;font-weight:600;font-size:18px;color:#333}
input{width:100%;padding:20px;border:3px solid #e0e0e0;border-radius:15px;font-size:24px;text-align:center;transition:all .3s}
input:focus{outline:none;border-color:#667eea;box-shadow:0 0 20px rgba(102,126,234,.3);transform:scale(1.02)}
.btn-group{display:grid;grid-template-columns:1fr;gap:15px;margin:30px 0}
button{padding:18px;border:none;border-radius:15px;font-size:18px;font-weight:600;cursor:pointer;transition:all .3s}
.btn-topup{background:linear-gradient(135deg,#ff6b6b,#ee5a24);color:white}
.btn-topup:hover{transform:translateY(-3px);box-shadow:0 10px 25px rgba(255,107,107,.4)}
.btn-home{background:linear-gradient(135deg,#667eea,#764ba2);color:white;margin-top:10px}
.btn-home:hover{transform:translateY(-3px);box-shadow:0 10px 25px rgba(102,126,234,.4)}
.success-message{display:none;padding:30px;border-radius:20px;margin:20px 0;background:linear-gradient(135deg,#56ab2f,#a8e6cf);color:white;text-align:center}
.success-icon{font-size:60px;margin-bottom:15px}
.balance-card{background:linear-gradient(135deg,#11998e,#38ef7d);padding:25px;border-radius:20px;margin:20px 0;color:white}
.balance-label{font-size:16px;opacity:.9}
.balance-amount{font-size:32px;font-weight:700;margin:10px 0}
.instruction{margin-top:20px;padding:20px;background:#f8f9ff;border-radius:15px;border-left:5px solid #667eea}
.instruction h3{margin-bottom:10px;color:#333}
.instruction ul{text-align:left;color:#666;padding-left:20px}
@media(max-width:600px){.container{padding:10px}.back-btn{left:10px;top:15px}}
</style>
</head>
<body>
<div class="container">
<div class="header">
<button class="back-btn" onclick="goBack()">←</button>
<h1>💰 Topup Dana</h1>
<p class="subtitle">Isi saldo untuk generate QRIS lebih cepat</p>
</div>
<div class="content">
<div class="balance-card">
<div class="balance-label">Saldo Saat Ini</div>
<div class="balance-amount" id="currentBalance">Rp 0</div>
</div>

<div class="topup-card">
<div class="topup-input-group">
<label>💵 Nominal Topup</label>
<input type="number" id="topupAmount" min="10000" max="5000000" placeholder="Min Rp10.000" />
</div>
<div class="btn-group">
<button class="btn-topup" id="btnTopup" onclick="processTopup()">🚀 Topup Sekarang</button>
<button class="btn-home" onclick="goHome()">🏠 Ke QRIS Generator</button>
</div>
</div>

<div class="success-message" id="successMessage">
<div class="success-icon">✅</div>
<h2>Topup Berhasil!</h2>
<p id="successText">Saldo Anda telah ditambahkan</p>
<button class="btn-topup" onclick="goHome()" style="margin-top:20px">Lanjut Generate QRIS</button>
</div>

<div class="instruction">
<h3>📋 Cara Topup:</h3>
<ul>
<li>1. Masukkan nominal (min Rp10.000)</li>
<li>2. Klik "Topup Sekarang"</li>
<li>3. Scan QRIS yang muncul</li>
<li>4. Saldo otomatis masuk</li>
</ul>
</div>
</div>
</div>

<script>
let currentBalance = 0;
let isProcessing = false;

// Update tampilan saldo
function updateBalance() {
    document.getElementById('currentBalance').textContent = 
        new Intl.NumberFormat('id-ID', {
            style: 'currency',
            currency: 'IDR',
            minimumFractionDigits: 0
        }).format(currentBalance);
}

// Simulasi proses topup (bisa diganti dengan API real)
async function processTopup() {
    if (isProcessing) return;
    
    const amount = parseInt(document.getElementById('topupAmount').value);
    if (!amount || amount < 10000) {
        alert('⚠️ Minimal topup Rp10.000');
        return;
    }
    
    isProcessing = true;
    document.getElementById('btnTopup').disabled = true;
    document.getElementById('btnTopup').textContent = '⏳ Processing...';
    
    // Simulasi delay + generate QRIS topup
    setTimeout(() => {
        // Di sini bisa integrasi dengan API QRIS yang sama
        showSuccess(amount);
        currentBalance += amount;
        updateBalance();
        document.getElementById('topupAmount').value = '';
        isProcessing = false;
        document.getElementById('btnTopup').disabled = false;
        document.getElementById('btnTopup').textContent = '🚀 Topup Sekarang';
    }, 2000);
}

function showSuccess(amount) {
    document.getElementById('successMessage').style.display = 'block';
    document.getElementById('successText').textContent = 
        `Rp ${new Intl.NumberFormat('id-ID').format(amount)} berhasil ditambahkan`;
    document.getElementById('successMessage').scrollIntoView({behavior: 'smooth'});
}

// Navigasi
function goBack() {
    window.history.back();
}

function goHome() {
    window.location.href = '/';
}

// Auto format input
document.getElementById('topupAmount').addEventListener('input', function(e) {
    let value = e.target.value.replace(/\D/g, '');
    if (value) {
        // Tambah titik sebagai pemisah ribuan untuk tampilan
        value = parseInt(value).toLocaleString('id-ID');
    }
    e.target.value = value;
});

// Enter untuk topup
document.getElementById('topupAmount').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
        processTopup();
    }
});

// Inisialisasi
updateBalance();
</script>
</body>
  </html>
