<!DOCTYPE html><html lang="id"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>QRIS Gen</title><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:Poppins,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}.container{max-width:400px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(20px);border-radius:20px;box-shadow:0 20px 40px rgba(0,0,0,0.2);overflow:hidden}.header{background:linear-gradient(135deg,#f59e0b 0%,#d97706 100%);color:#fff;padding:30px 20px;text-align:center}h1{font-size:2em;font-weight:900;margin:0}.content{padding:40px 30px 30px}.input-group{margin-bottom:30px}label{display:block;margin-bottom:10px;font-weight:700;color:#333;font-size:1.1em}input{width:100%;padding:20px;border:2px solid #e2e8f0;border-radius:15px;font-size:1.3em;font-weight:600;background:#fff;transition:all .3s;box-shadow:0 10px 20px rgba(0,0,0,0.1)}input:focus{border-color:#10b981;outline:0;box-shadow:0 0 0 3px rgba(16,185,129,0.2),0 15px 30px rgba(0,0,0,0.15);transform:translateY(-2px)}button{padding:20px 30px;border:0;border-radius:15px;font-size:1.2em;font-weight:700;cursor:pointer;transition:all .3s;box-shadow:0 10px 25px rgba(0,0,0,0.15);width:100%;margin-bottom:20px}.btn-gen{background:linear-gradient(135deg,#10b981 0%,#059669 100%);color:#fff}.btn-gen:hover,.btn-gen:active{transform:translateY(-3px);box-shadow:0 15px 35px rgba(16,185,129,0.4)}.btn-gen:disabled{opacity:0.6;cursor:not-allowed;transform:none}.loading{display:none;text-align:center;padding:50px}.spinner{width:60px;height:60px;border:5px solid #f3f3f3;border-top:5px solid #667eea;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 20px}@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}.result{display:none;padding:30px;text-align:center;background:linear-gradient(135deg,#10b981 0%,#059669 100%);color:#fff;border-radius:20px;margin-top:20px}.total-bayar{font-size:2.5em;font-weight:900;margin:20px 0 10px;color:#fff}.detail-trans{margin-top:30px}.detail-title{font-size:1.4em;font-weight:900;margin-bottom:15px}.detail-item{margin:10px 0;font-size:1.1em}.qris-img{max-width:100%;height:auto;border-radius:15px;margin:20px 0;box-shadow:0 20px 40px rgba(0,0,0,0.3)}.cara-bayar{margin-top:25px;padding:20px;background:rgba(255,255,255,0.2);border-radius:15px;font-size:1em;line-height:1.5}.admin-fee{margin-top:15px;font-weight:700;font-size:1.1em}.error{color:#ff4444;font-weight:700;padding:20px}@media(max-width:480px){h1{font-size:1.6em}.total-bayar{font-size:2em}}</style></head><body><div class="container"><div class="header"><h1><i class="fas fa-qrcode"></i> QRIS Gen</h1></div><div class="content"><div class="input-group"><label><i class="fas fa-money-bill-wave"></i> Nominal (Rp)</label><input type="number" id="amount" min="100" placeholder="Min Rp100"></div><button class="btn-gen" id="btnGen" onclick="generate()"><i class="fas fa-magic"></i> Generate QRIS</button><div class="loading" id="loading"><div class="spinner"></div><p id="loadingText">🔄 Generating QRIS...</p></div></div><div class="result" id="result"></div></div><script>const TOKEN='cki_MDT3cC14ASTcV9yCcZOEOROZFqVgNvZlWjsC5ofjrp3x2DBe';const API='https://api.qrispy.id';let currentQRIS=null;const formatRp=n=>new Intl.NumberFormat('id-ID',{style:'currency',currency:'IDR',minimumFractionDigits:0}).format(n);async function generate(){const btn=document.getElementById('btnGen');const amount=parseInt(document.getElementById('amount').value);if(!amount||amount<100){alert('Minimal Rp 100!');return}btn.disabled=true;btn.innerHTML='<i class="fas fa-spinner fa-spin"></i> Generating...';document.getElementById('loading').style.display='block';document.getElementById('result').style.display='none';try{const res=await fetch(`${API}/api/payment/qris/generate`,{method:'POST',headers:{'X-API-Token':TOKEN,'Content-Type':'application/json'},body:JSON.stringify({amount:amount})});const data=await res.json();if(data.status==='success'){currentQRIS=data.data;showResult();}else{throw data.message||'API Error'}}catch(e){console.error('Error:',e);document.getElementById('result').innerHTML=`<div class="error"><i class="fas fa-exclamation-triangle"></i> Error: ${e}. Coba lagi!</div>`;document.getElementById('result').style.display='block';}finally{btn.disabled=false;btn.innerHTML='<i class="fas fa-magic"></i> Generate QRIS';document.getElementById('loading').style.display='none';}}function showResult(){const data=currentQRIS;document.getElementById('result').innerHTML=`<div class="total-bayar">${formatRp(data.amount)}</div><div class="detail-trans"><div class="detail-title">Detail Transaksi</div><div class="detail-item">ID Transaksi: ${data.qris_id.slice(0,16)}...</div><div class="detail-item">Nominal: ${formatRp(data.amount)}</div><div class="detail-item">Biaya Admin: Rp 0</div></div><img src="${data.qris_image_url}" class="qris-img" alt="QRIS" onload="this.style.opacity=1" style="opacity:0.5;transition:opacity .3s"><div class="cara-bayar">Buka aplikasi bank/ewallet, scan QRIS di atas, lalu lakukan pembayaran</div>`;document.getElementById('result').style.display='block';document.getElementById('result').scrollIntoView({behavior:'smooth'});}document.getElementById('amount').addEventListener('input',e=>e.target.value=e.target.value.replace(/\D/g,''));document.addEventListener('keypress',e=>{if(e.key==='Enter')generate()});</script></body></html>
