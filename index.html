<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QRIS Generator Dinamis</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex; /* ✅ Tambahan: Flex container */
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }

        .container {
            max-width: 800px;
            width: 100%; /* ✅ Pastikan full width container */
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden; /* ✅ Anti-float */
            display: flex;
            flex-direction: column;
        }

        .header {
            background: linear-gradient(135deg, #ff6b6b, #feca57);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .content {
            padding: 40px;
            flex: 1; /* ✅ Mengisi sisa ruang */
            display: flex;
            flex-direction: column;
            gap: 30px; /* ✅ Gap antar section */
        }

        .form-section {
            background: #f8f9fa;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            /* ✅ Tidak perlu float, sudah flex */
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 16px;
        }

        input {
            width: 100%;
            padding: 18px;
            border: 2px solid #e1e5e9;
            border-radius: 12px;
            font-size: 18px;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .btn-generate, .btn-cancel {
            padding: 20px;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-generate {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-generate:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(102, 126, 234, 0.4);
        }

        .btn-cancel {
            background: linear-gradient(135deg, #ff416c, #ff4b2b);
            color: white;
        }

        .btn-cancel:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(255, 65, 108, 0.4);
        }

        .btn-generate:disabled, .btn-cancel:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .qris-result {
            text-align: center;
            padding: 40px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border-radius: 20px;
            color: white;
            display: none;
            margin-top: 30px;
            position: relative;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            /* ✅ Flex untuk konten internal */
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .status-paid {
            background: linear-gradient(135deg, #56ab2f, #a8e6cf) !important;
            animation: celebrate 0.6s ease-in-out;
        }

        .status-cancelled {
            background: linear-gradient(135deg, #95a5a6, #7f8c8d) !important;
        }

        @keyframes celebrate {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .qris-image {
            max-width: 320px;
            width: 100%;
            height: auto;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .qris-info {
            margin: 25px 0;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }

        .info-item {
            background: rgba(255,255,255,0.25);
            padding: 12px 25px;
            border-radius: 30px;
            font-size: 16px;
            backdrop-filter: blur(10px);
        }

        .action-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }

        .btn-action {
            background: rgba(255,255,255,0.95);
            color: #333;
            border: none;
            padding: 12px 25px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .btn-action:hover {
            background: white;
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .loading {
            display: none;
            text-align: center;
            padding: 40px;
            /* ✅ Flex center */
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .spinner {
            border: 5px solid #f3f3f3;
            border-top: 5px solid #667eea;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            
            .btn-group {
                grid-template-columns: 1fr;
                gap: 15px;
            }
            
            .content {
                padding: 25px;
            }
            
            .header h1 {
                font-size: 2em;
            }
            
            .action-buttons {
                flex-direction: column;
                align-items: center;
            }
            
            .btn-action {
                width: 100%;
                max-width: 250px;
            }
        }
    </style>
</head>
<body>
    <!-- HTML sama persis, hanya CSS yang diperbaiki -->
    <div class="container">
        <div class="header">
            <h1>🚀 QRIS Generator</h1>
            <p>Generate QRIS Dinamis - Minimal Rp1.000</p>
        </div>

        <div class="content">
            <div class="form-section">
                <div class="form-group">
                    <label for="amount">💰 Nominal (Rp)</label>
                    <input type="number" id="amount" min="1000" placeholder="Masukkan nominal minimal Rp1.000" required>
                </div>

                <div class="btn-group">
                    <button class="btn-generate" onclick="generateQRIS()">
                        <span>🎫 Generate QRIS</span>
                    </button>
                    <button class="btn-cancel" onclick="cancelCurrentQRIS()" id="btnCancel" style="display: none;">
                        <span>❌ Batalkan Pesanan</span>
                    </button>
                </div>
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p id="loadingText">Generating QRIS...</p>
            </div>

            <div class="qris-result" id="qrisResult">
                <h2 id="resultTitle">✅ QRIS Berhasil Dibuat!</h2>
                <img id="qrisImage" class="qris-image" alt="QRIS Code">
                <div class="qris-info" id="qrisInfo"></div>
                
                <div class="action-buttons">
                    <button class="btn-action" onclick="copyQRIS()">
                        📋 Copy Link QRIS
                    </button>
                    <button class="btn-action" onclick="downloadQRIS()">
                        ⬇️ Download PNG
                    </button>
                    <button class="btn-action" onclick="checkStatusNow()">
                        🔄 Cek Status
                    </button>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
