<!DOCTYPE html><html lang="id"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>QRIS + NOKOS Auto</title><link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@400;700;900&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:Poppins,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}.container{max-width:400px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(20px);border-radius:20px;box-shadow:0 20px 40px rgba(0,0,0,0.2)}.header{background:linear-gradient(135deg,#f59e0b 0%,#d97706 100%);color:#fff;padding:20px;text-align:center}h1{font-size:1.8em;font-weight:900}.content{padding:30px}.input-group{margin-bottom:15px}label{display:block;margin-bottom:8px;font-weight:700;color:#333}input,select{width:100%;padding:15px;border:2px solid #e2e8f0;border-radius:12px;font-size:1.1em;font-weight:500;background:#fff;transition:all .3s}input:focus,select:focus{border-color:#10b981;outline:0;box-shadow:0 0 0 3px rgba(16,185,129,0.2)}button{padding:15px;border:0;border-radius:12px;font-size:1.1em;font-weight:700;cursor:pointer;transition:all .3s;width:100%;margin-bottom:10px}.btn-gen{background:linear-gradient(135deg,#10b981 0%,#059669 100%);color:#fff}.btn-nokos{background:linear-gradient(135deg,#ef4444 0%,#dc2626 100%);color:#fff}.btn:hover{transform:translateY(-2px);box-shadow:0 10px 25px rgba(0,0,0,0.2)}.btn:disabled{opacity:.6;cursor:not-allowed}.loading{display:none;text-align:center;padding:30px}.spinner{width:40px;height:40px;border:4px solid #f3f3f3;border-top:4px solid #667eea;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 15px}@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}.result-qris,.result-nokos{display:none;padding:25px;text-align:center;color:#fff;border-radius:15px;margin-top:15px}.result-qris{background:linear-gradient(135deg,#10b981 0%,#059669 100%)}.result-nokos{background:linear-gradient(135deg,#ef4444 0%,#dc2626 100%)}.total-bayar{font-size:2em;font-weight:900;margin:15px 0}.qris-final{width:250px;height:250px;border:4px solid #fff;border-radius:8px;margin:15px auto;display:block;box-shadow:0 15px 30px rgba(0,0,0,0.3)}.nokos-number{font-size:1.6em;font-weight:900;background:#fff;color:#333;padding:15px;border-radius:12px;margin:10px 0;box-shadow:0 8px 25px rgba(0,0,0,0.2)}.error{color:#ff4444;font-weight:700;padding:15px;background:rgba(255,68,68,0.1);border-radius:12px;margin-top:10px}.section-title{color:#333;margin:25px 0 15px;font-weight:900;border-top:1px solid #eee;padding-top:15px}@media(max-width:480px){.qris-final{width:220px;height:220px}}</style></head><body><div class="container"><div class="header"><h1><i class="fas fa-gem"></i> QRIS + NOKOS</h1></div><div class="content"><h3 class="section-title">QRIS Payment</h3><div class="input-group"><label><i class="fas fa-money-bill-wave"></i> Nominal</label><input type="number" id="qrisAmount" min="100" placeholder="Min Rp100"></div><button class="btn btn-gen" id="btnQris"><i class="fas fa-qrcode"></i> Generate QRIS</button><div class="loading" id="loadingQris"><div class="spinner"></div>🔄 Generating...</div><div class="result-qris" id="resultQris"></div><button class="btn btn-nokos" id="btnNokos" style="display:none"><i class="fas fa-phone"></i> Buy NOKOS</button><h3 class="section-title">NOKOS Auto</h3><div class="input-group"><label><i class="fas fa-globe"></i> Negara</label><select id="negara"><option value="">Pilih...</option></select></div><div class="input-group"><label><i class="fas fa-layer-group"></i> Layanan</label><select id="layanan"><option value="">Pilih...</option></select></div><div class="input-group"><label><i class="fas fa-network-wired"></i> Operator</label><select id="operator"><option value="">Pilih...</option></select></div><div class="loading" id="loadingNokos"><div class="spinner"></div>🔄 Buying...</div><div class="result-nokos" id="resultNokos"></div></div></div><script>const NEGARA=[{id:'ID',nama:'Indonesia'},{id:'US',nama:'USA'},{id:'SG',nama:'Singapore'}];const LAYANAN={'ID':{wa:{n:'Whatsapp',h:5000},sms:{n:'SMS',h:3000}},'US':{sms:{n:'SMS',h:10000}}};const OPERATOR={'ID':['Telkomsel','XL'],'US':['Verizon','ATT'],'SG':['Singtel']};const formatRp=n=>`Rp${n.toLocaleString('id-ID')}`;const randCode=()=>Math.random().toString(36).substr(2,5).toUpperCase();document.addEventListener('DOMContentLoaded',()=>{loadNokos();document.getElementById('qrisAmount').oninput=e=>e.target.value=e.target.value.replace(/\D/g,'');document.getElementById('btnQris').onclick=generateQRIS;document.getElementById('btnNokos').onclick=buyNokos;});function loadNokos(){const s=document.getElementById('negara');NEGARA.forEach(n=>{const o=document.createElement('option');o.value=o.text=n.nama.toUpperCase();s.appendChild(o);});s.onchange=()=>{const id=s.value,nl=document.getElementById('layanan'),no=document.getElementById('operator');nl.innerHTML='<option>Loading...</option>';no.innerHTML='<option>Loading...</option>';setTimeout(()=>{nl.innerHTML='<option>Pilih...</option>';no.innerHTML='<option>Pilih...</option>';if(LAYANAN[id])Object.entries(LAYANAN[id]).forEach(([k,v])=>{const o=document.createElement('option');o.value=k;o.text=`${v.n} (${formatRp(v.h)})`;nl.appendChild(o);});if(OPERATOR[id])OPERATOR[id].forEach(op=>{const o=document.createElement('option');o.value=o.text=op;s.appendChild(o);no.appendChild(o);});},800);};}async function generateQRIS(){const btn=document.getElementById('btnQris'),amt=parseInt(document.getElementById('qrisAmount').value);if(!amt||amt<100){alert('Min Rp100!');return;}btn.disabled=true;btn.innerHTML='<i class="fas fa-spinner fa-spin"></i> Loading...';document.getElementById('loadingQris').style.display='block';document.getElementById('resultQris').style.display='none';await new Promise(r=>setTimeout(r,1500));const total=amt+Math.floor(Math.random()*3000)+2000,qrisDataURL='https://api.qrispy.id/qris.png';showQRIS(total,qrisDataURL);document.getElementById('btnNokos').style.display='block';btn.disabled=false;btn.innerHTML='<i class="fas fa-qrcode"></i> Generate QRIS';document.getElementById('loadingQris').style.display='none';}function showQRIS(total,qrisUrl){const id=`YNTO-${randCode()}`,fee=total-parseInt(document.getElementById('qrisAmount').value);document.getElementById('resultQris').innerHTML=`<div class="total-bayar">${formatRp(total)}</div><div>ID: ${id} | Fee: ${formatRp(fee)}</div><img src="${qrisUrl}" class="qris-final"><div style="margin-top:15px;padding:15px;background:rgba(255,255,255,0.2);border-radius:12px">Scan QRIS → Buy NOKOS</div>`;document.getElementById('resultQris').style.display='block';}async function buyNokos(){const btn=document.getElementById('btnNokos'),negara=document.getElementById('negara').value,layanan=document.getElementById('layanan').value,op=document.getElementById('operator').value;if(!negara||!layanan||!op){alert('Pilih semua!');return;}btn.disabled=true;btn.innerHTML='<i class="fas fa-spinner fa-spin"></i> Buying...';document.getElementById('loadingNokos').style.display='block';document.getElementById('resultNokos').style.display='none';await new Promise(r=>setTimeout(r,2000));const number=`+62${Math.floor(1000000000+Math.random()*9000000000)}`,orderId=`NOK-${randCode()}`;showNokos(number,orderId);checkOTP(orderId);btn.disabled=false;btn.innerHTML='<i class="fas fa-phone"></i> Buy NOKOS';document.getElementById('loadingNokos').style.display='none';}function showNokos(number,orderId){document.getElementById('resultNokos').innerHTML=`<div class="nokos-number"><i class="fas fa-phone"></i> ${number}</div><div class="nokos-status">Order: ${orderId}<br>⏳ Waiting OTP...</div>`;document.getElementById('resultNokos').style.display='block';}function checkOTP(orderId){setTimeout(()=>{document.getElementById('resultNokos').innerHTML=`<div class="nokos-number"><i class="fas fa-check-circle" style="color:#10b981"></i> ✅ 123456</div><div class="nokos-status">OTP Ready! | ${orderId}</div>`;},5000);}</script></body></html>
