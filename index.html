<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QRIS GENERATOR</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #ff6b6b, #feca57);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.2em;
            margin-bottom: 5px;
        }

        .content {
            padding: 40px;
        }

        .form-section {
            background: #f8f9fa;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
        }

        input {
            width: 100%;
            padding: 18px;
            border: 2px solid #e1e5e9;
            border-radius: 12px;
            font-size: 18px;
            margin-bottom: 20px;
        }

        .btn-generate {
            width: 100%;
            padding: 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-generate:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102,126,234,0.4);
        }

        .btn-generate:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .results {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .qris-item {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border-radius: 15px;
            padding: 20px;
            color: white;
            position: relative;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .qris-item.best {
            border: 3px solid #ffd700;
            background: linear-gradient(135deg, #feca57, #ff9ff3) !important;
        }

        .qris-item.paid {
            background: linear-gradient(135deg, #56ab2f, #a8e6cf) !important;
            animation: bounce 0.6s;
        }

        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .qris-img {
            width: 100%;
            height: 180px;
            object-fit: contain;
            border-radius: 10px;
            margin: 10px 0;
        }

        .qris-id {
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 5px;
        }

        .admin-fee {
            font-size: 20px;
            font-weight: bold;
            color: #ffd700;
        }

        .status {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            margin: 8px 0;
            display: inline-block;
        }

        .status.pending { background: rgba(255,193,7,0.3); color: #856404; }
        .status.paid { background: rgba(40,167,69,0.4); color: white; }
        .status.expired { background: rgba(108,117,125,0.3); color: white; }

        .loading {
            text-align: center;
            padding: 60px;
            display: none;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .results {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>QRIS GENERATOR</h1>
            <p>Generate 6x - Auto Pilih Termurah</p>
        </div>

        <div class="content">
            <div class="form-section">
                <input type="number" id="amount" placeholder="Nominal (Rp)" min="0">
                <button class="btn-generate" onclick="generate6x()">GENERATE 6x</button>
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p id="loadingText">Loading...</p>
            </div>

            <div class="results" id="results"></div>
        </div>
    </div>

    <script>
        const API_TOKEN = 'cki_MDT3cC14ASTcV9yCcZOEOROZFqVgNvZlWjsC5ofjrp3x2DBe';
        const API_URL = 'https://api.qrispy.id';
        let qrisData = [];

        function formatRupiah(n) {
            return new Intl.NumberFormat('id-ID').format(n);
        }

        async function generate6x() {
            const amount = parseInt(document.getElementById('amount').value) || 0;
            
            const btn = document.querySelector('.btn-generate');
            const loading = document.getElementById('loading');
            const results = document.getElementById('results');

            btn.disabled = true;
            btn.textContent = 'Generating...';
            loading.style.display = 'block';
            results.innerHTML = '';

            try {
                // ✅ GENERATE 6x PARALEL
                const promises = Array.from({length: 6}, async (_, i) => {
                    try {
                        const res = await fetch(`${API_URL}/api/payment/qris/generate`, {
                            method: 'POST',
                            headers: {
                                'X-API-Token': API_TOKEN,
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({amount})
                        });
                        const data = await res.json();
                        return data.status === 'success' ? {...data.data, tryIndex: i} : null;
                    } catch {
                        return null;
                    }
                });

                const resultsData = (await Promise.all(promises)).filter(Boolean);
                qrisData = resultsData.sort((a, b) => (a.admin_fee || 999) - (b.admin_fee || 999));

                displayResults();
                monitorAll();

            } catch(e) {
                alert('Error: ' + e.message);
            } finally {
                btn.disabled = false;
                btn.textContent = 'GENERATE 6x';
                loading.style.display = 'none';
            }
        }

        function displayResults() {
            const results = document.getElementById('results');
            results.innerHTML = qrisData.map((qris, i) => `
                <div class="qris-item ${i === 0 ? 'best' : ''}" id="qris-${qris.qris_id}">
                    <div class="qris-id">#${qris.tryIndex + 1}</div>
                    ${i === 0 ? '<div style="color:#ffd700;font-weight:bold;">TERMURAH</div>' : ''}
                    <img src="${qris.qris_image_url}" class="qris-img">
                    <div>${formatRupiah(qris.amount)}</div>
                    <div class="admin-fee">${formatRupiah(qris.admin_fee || 0)}</div>
                    <div class="status pending">Pending</div>
                </div>
            `).join('');
        }

        async function monitorAll() {
            for (const qris of qrisData) {
                monitorSingle(qris.qris_id);
            }
        }

        async function monitorSingle(qrisId) {
            let attempts = 0;
            while (attempts < 20) { // 3 menit max
                try {
                    const res = await fetch(`${API_URL}/api/payment/qris/${qrisId}/status`, {
                        headers: {'X-API-Token': API_TOKEN}
                    });
                    const data = await res.json();
                    
                    const card = document.getElementById(`qris-${qrisId}`);
                    const statusEl = card.querySelector('.status');
                    
                    if (data.status === 'paid') {
                        statusEl.textContent = 'PAID ✅';
                        statusEl.className = 'status paid';
                        card.classList.add('paid');
                        alert(`✅ PAID! QRIS ${qrisId.slice(-6)}`);
                        return;
                    } else if (data.status === 'expired') {
                        statusEl.textContent = 'Expired';
                        statusEl.className = 'status expired';
                        return;
                    }
                } catch(e) {}
                
                attempts++;
                await new Promise(r => setTimeout(r, 9000)); // 9 detik
            }
        }

        document.getElementById('amount').addEventListener('input', function(e) {
            e.target.value = e.target.value.replace(/\D/g, '');
        });

        document.addEventListener('keypress', e => {
            if (e.key === 'Enter') generate6x();
        });
    </script>
</body>
</html>
