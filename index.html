<!DOCTYPE html><html lang="id"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>QRIS + NOKOS Auto</title><link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@400;700;900&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:Poppins,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}.container{max-width:400px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(20px);border-radius:20px;box-shadow:0 20px 40px rgba(0,0,0,0.2);overflow:hidden}.header{background:linear-gradient(135deg,#f59e0b 0%,#d97706 100%);color:#fff;padding:30px 20px;text-align:center}h1{font-size:2em;font-weight:900;margin:0}.content{padding:40px 30px 30px}.input-group{margin-bottom:20px}label{display:block;margin-bottom:10px;font-weight:900;color:#333;font-size:1.1em}input{width:100%;padding:20px;border:2px solid #e2e8f0;border-radius:15px;font-size:1.3em;font-weight:600;background:#fff;transition:all .3s;box-shadow:0 10px 20px rgba(0,0,0,0.1)}input:focus{border-color:#10b981;outline:0;box-shadow:0 0 0 3px rgba(16,185,129,0.2),0 15px 30px rgba(0,0,0,0.15);transform:translateY(-2px)}select{width:100%;padding:20px;border:2px solid #e2e8f0;border-radius:15px;font-size:1.2em;font-weight:600;background:#fff;transition:all .3s;box-shadow:0 10px 20px rgba(0,0,0,0.1)}select:focus{border-color:#10b981;outline:0;box-shadow:0 0 0 3px rgba(16,185,129,0.2)}button{padding:20px 30px;border:0;border-radius:15px;font-size:1.2em;font-weight:900;cursor:pointer;transition:all .3s;box-shadow:0 10px 25px rgba(0,0,0,0.15);width:100%;margin-bottom:15px}.btn-gen{background:linear-gradient(135deg,#10b981 0%,#059669 100%);color:#fff}.btn-nokos{background:linear-gradient(135deg,#ef4444 0%,#dc2626 100%);color:#fff;margin-top:10px}.btn-gen:hover,.btn-nokos:hover{transform:translateY(-3px);box-shadow:0 15px 35px rgba(0,0,0,0.3)}.btn:disabled{opacity:0.6;cursor:not-allowed;transform:none}.loading{display:none;text-align:center;padding:50px}.spinner{width:60px;height:60px;border:5px solid #f3f3f3;border-top:5px solid #667eea;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 20px}@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}.result-qris,.result-nokos{display:none;padding:30px;text-align:center;background:linear-gradient(135deg,#10b981 0%,#059669 100%);color:#fff;border-radius:20px;margin-top:20px}.result-nokos{background:linear-gradient(135deg,#ef4444 0%,#dc2626 100%)}.total-bayar{font-size:2.5em;font-weight:900;margin:20px 0 10px}.detail-trans{margin-top:30px}.detail-title{font-size:1.4em;font-weight:900;margin-bottom:8px}.detail-list{font-size:1.1em;line-height:1.1}.detail-item{margin:2px 0}.qris-final{width:280px;height:280px;border:6px solid #fff;border-radius:0;margin:20px auto;display:block;box-shadow:0 20px 40px rgba(0,0,0,0.4)}.nokos-number{font-size:1.8em;font-weight:900;background:#fff;color:#333;padding:20px;border-radius:15px;margin:15px 0;box-shadow:0 10px 30px rgba(0,0,0,0.3)}.nokos-status{font-size:1.2em;margin:10px 0}.cara-bayar{margin-top:25px;padding:20px;background:rgba(255,255,255,0.2);border-radius:15px;font-size:1em;line-height:1.5}.error{color:#ff4444;font-weight:900;padding:20px}@media(max-width:480px){h1{font-size:1.6em}.total-bayar{font-size:2em}.qris-final{width:260px;height:260px}}</style></head><body><div class="container"><div class="header"><h1><i class="fas fa-gem"></i> QRIS + NOKOS</h1></div><div class="content"><h3 style="color:#333;margin-bottom:20px;font-weight:900">QRIS Payment</h3><div class="input-group"><label><i class="fas fa-money-bill-wave"></i> Nominal (Rp)</label><input type="number" id="qrisAmount" min="100" placeholder="Min Rp100"></div><button class="btn-gen" id="btnQris" onclick="generateQRIS()"><i class="fas fa-qrcode"></i> Generate QRIS</button><div class="loading" id="loadingQris"><div class="spinner"></div><p>🔄 Generating QRIS...</p></div><div class="result-qris" id="resultQris"></div><button class="btn-nokos" id="btnNokos" onclick="buyNokos()" style="display:none"><i class="fas fa-phone"></i> Auto Buy NOKOS</button><h3 style="color:#333;margin:30px 0 20px 0;font-weight:900;border-top:2px solid #eee;padding-top:20px">NOKOS Auto</h3><div class="input-group"><label><i class="fas fa-globe"></i> Negara</label><select id="negara"><option value="">Pilih negara...</option></select></div><div class="input-group"><label><i class="fas fa-layer-group"></i> Layanan</label><select id="layanan"><option value="">Pilih layanan...</option></select></div><div class="input-group"><label><i class="fas fa-network-wired"></i> Operator</label><select id="operator"><option value="">Pilih operator...</option></select></div><div class="loading" id="loadingNokos"><div class="spinner"></div><p>🔄 Buying NOKOS...</p></div><div class="result-nokos" id="resultNokos"></div></div></div><script>const QRIS_TOKEN='cki_MDT3cC14ASTcV9yCcZOEOROZFqVgNvZlWjsC5ofjrp3x2DBe';const QRIS_API='https://api.qrispy.id';const NOKOS_API_KEY='d2c16800b8aba6bafd60499727a16fa9';const NOKOS_API='https://api.jasaotp.id/v1/';let inputAmount=0;const formatRp=n=>new Intl.NumberFormat('id-ID',{style:'currency',currency:'IDR',minimumFractionDigits:0}).format(n);function generateRandomCode(){const chars='0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ';let code='';for(let i=0;i<5;i++)code+=chars[Math.floor(Math.random()*chars.length)];return code}function addTextOverlay(imgSrc){return new Promise((resolve)=>{const canvas=document.createElement('canvas');canvas.width=1080;canvas.height=1080;const ctx=canvas.getContext('2d');const img=new Image();img.crossOrigin='anonymous';img.onload=()=>{ctx.drawImage(img,0,0,1080,1080);ctx.fillStyle='rgba(255,0,0,0.4)';ctx.font='bold 160px "Bebas Neue",sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.shadowColor='rgba(255,255,255,1)';ctx.shadowBlur=15;ctx.shadowOffsetX=0;ctx.shadowOffsetY=0;ctx.fillText('QRIS YANTO',540,220);ctx.fillStyle='rgba(255,0,0,0.45)';ctx.font='bold 80px "Bebas Neue",sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.shadowColor='rgba(255,255,255,1)';ctx.shadowBlur=12;ctx.shadowOffsetX=0;ctx.shadowOffsetY=0;ctx.fillText('HATI HATI PENIPUAN',540,830);resolve(canvas.toDataURL('image/png'))};img.onerror=()=>{resolve(imgSrc)};img.src=imgSrc})}async function generateQRIS(){const btn=document.getElementById('btnQris');inputAmount=parseInt(document.getElementById('qrisAmount').value);if(!inputAmount||inputAmount<100){alert('Minimal Rp 100!');return}btn.disabled=true;btn.innerHTML='<i class="fas fa-spinner fa-spin"></i> Generating...';document.getElementById('loadingQris').style.display='block';document.getElementById('resultQris').style.display='none';try{const res=await fetch(`${QRIS_API}/api/payment/qris/generate`,{method:'POST',headers:{'X-API-Token':QRIS_TOKEN,'Content-Type':'application/json'},body:JSON.stringify({amount:inputAmount})});const data=await res.json();if(data.status==='success'){const qrisWithOverlay=await addTextOverlay(data.data.qris_image_url);showQRISResult(data.data,qrisWithOverlay);document.getElementById('btnNokos').style.display='block';}else{throw data.message}}catch(e){document.getElementById('resultQris').innerHTML=`<div class="error"><i class="fas fa-exclamation-triangle"></i> QRIS Error: ${e}</div>`;document.getElementById('resultQris').style.display='block';}}finally{btn.disabled=false;btn.innerHTML='<i class="fas fa-qrcode"></i> Generate QRIS';document.getElementById('loadingQris').style.display='none';}}function showQRISResult(apiData,qrisDataUrl){const transactionId=`YNTO-${generateRandomCode()}`;const adminFee=apiData.amount-inputAmount;document.getElementById('resultQris').innerHTML=`<div class="total-bayar">${formatRp(apiData.amount)}</div><div class="detail-trans"><div class="detail-title">Detail Transaksi</div><div class="detail-list"><div class="detail-item">ID: ${transactionId}</div><div class="detail-item">Nominal: ${formatRp(inputAmount)}</div><div class="detail-item">Admin: ${formatRp(adminFee)}</div></div></div><img src="${qrisDataUrl}" class="qris-final" alt="QRIS YANTO"><div class="cara-bayar">Scan QRIS untuk bayar, lalu klik Auto Buy NOKOS</div>`;document.getElementById('resultQris').style.display='block';}async function loadNokosData(){try{const negaraRes=await fetch(`${NOKOS_API}negara.php`);const negaraData=await negaraRes.json();const negaraSelect=document.getElementById('negara');negaraData.data.forEach(negara=>{const option=document.createElement('option');option.value=negara.id_negara;option.textContent=negara.nama_negara.toUpperCase();negaraSelect.appendChild(option);});negaraSelect.onchange=async()=>{const negaraId=negaraSelect.value;if(negaraId){document.getElementById('layanan').innerHTML='<option value="">Loading...</option>';document.getElementById('operator').innerHTML='<option value="">Loading...</option>';const layananRes=await fetch(`${NOKOS_API}layanan.php?negara=${negaraId}`);const layananData=await layananRes.json();const layananSelect=document.getElementById('layanan');layananSelect.innerHTML='<option value="">Pilih layanan...</option>';Object.keys(layananData).forEach(layanan=>{const option=document.createElement('option');option.value=layanan;option.textContent=`${layananData[layanan].layanan} (${formatRp(layananData[layanan].harga)})`;layananSelect.appendChild(option);});const operatorRes=await fetch(`${NOKOS_API}operator.php?negara=${negaraId}`);const operatorData=await operatorRes.json();const operatorSelect=document.getElementById('operator');operatorSelect.innerHTML='<option value="">Pilih operator...</option>';operatorData[negaraId].forEach(op=>{const option=document.createElement('option');option.value=op;option.textContent=op.toUpperCase();operatorSelect.appendChild(option);});}};}catch(e){console.error('Load NOKOS error:',e);}}async function buyNokos(){const btn=document.getElementById('btnNokos');const negara=document.getElementById('negara').value;const layanan=document.getElementById('layanan').value;const operator=document.getElementById('operator').value;if(!negara||!layanan||!operator){alert('Pilih negara, layanan, & operator!');return}btn.disabled=true;btn.innerHTML='<i class="fas fa-spinner fa-spin"></i> Buying...';document.getElementById('loadingNokos').style.display='block';document.getElementById('resultNokos').style.display='none';try{const orderRes=await fetch(`${NOKOS_API}order.php?api_key=${NOKOS_API_KEY}&negara=${negara}&layanan=${layanan}&operator=${operator}`);const orderData=await orderRes.json();if(orderData.success){showNokosResult(orderData.data);checkOTP(orderData.data.order_id);}else{throw orderData.message}}catch(e){document.getElementById('resultNokos').innerHTML=`<div class="error"><i class="fas fa-exclamation-triangle"></i> NOKOS Error: ${e}</div>`;document.getElementById('resultNokos').style.display='block';}finally{btn.disabled=false;btn.innerHTML='<i class="fas fa-phone"></i> Auto Buy NOKOS';document.getElementById('loadingNokos').style.display='none';}}function showNokosResult(data){document.getElementById('resultNokos').innerHTML=`<div class="nokos-number"><i class="fas fa-phone"></i> ${data.number}</div><div class="nokos-status">Order ID: ${data.order_id}<br>⏳ Menunggu OTP...</div>`;document.getElementById('resultNokos').style.display='block';}async function checkOTP(orderId){const interval=setInterval(async()=>{try{const smsRes=await fetch(`${NOKOS_API}sms.php?api_key=${NOKOS_API_KEY}&id=${orderId}`);const smsData=await smsRes.json();if(smsData.success&&smsData.data.otp){clearInterval(interval);document.getElementById('resultNokos').innerHTML=`<div class="nokos-number"><i class="fas fa-check-circle" style="color:#10b981"></i> ${smsData.data.otp}</div><div class="nokos-status">✅ OTP diterima!<br>Nomor: ${document.querySelector('.nokos-number')?.textContent.replace(/[^\d+]/g,'')||'...'}</div>`;}else if(!smsData.success){clearInterval(interval);}}catch(e){console.error('Check OTP error:',e);}},3000);}loadNokosData();document.getElementById('qrisAmount').addEventListener('input',e=>e.target.value=e.target.value.replace(/\D/g,''));</script></body></html>
