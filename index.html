<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QRIS Top Up Game - SenPay</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 450px;
            margin: 0 auto;
            background: white;
            border-radius: 25px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #ff6b6b, #feca57);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.2em;
            margin-bottom: 10px;
        }

        .content {
            padding: 30px;
        }

        /*** QRIS GENERATOR ***/
        .qris-section {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 20px;
            margin-bottom: 25px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e1e5e9;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn-generate {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 18px;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            margin-top: 10px;
        }

        .btn-generate:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-generate:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /*** TOP UP PRODUCTS ***/
        .topup-section {
            margin-top: 30px;
            padding: 25px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border-radius: 20px;
            color: white;
        }

        .topup-section h3 {
            margin-bottom: 20px;
            text-align: center;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
        }

        .product-card {
            background: rgba(255,255,255,0.2);
            border: 2px solid transparent;
            border-radius: 15px;
            padding: 20px 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .product-card:hover, .product-card.active {
            border-color: white;
            background: rgba(255,255,255,0.3);
            transform: translateY(-5px);
        }

        .product-icon {
            font-size: 28px;
            margin-bottom: 10px;
        }

        /*** RESULT ***/
        .result {
            text-align: center;
            padding: 30px;
            background: linear-gradient(135deg, #56ab2f, #a8e6cf);
            border-radius: 20px;
            color: white;
            display: none;
            margin-top: 25px;
        }

        .qris-img {
            max-width: 300px;
            width: 100%;
            border-radius: 15px;
            margin: 20px auto;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        .btn-copy {
            background: rgba(255,255,255,0.9);
            color: #333;
            border: none;
            padding: 12px 25px;
            margin: 10px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-copy:hover {
            background: white;
            transform: translateY(-2px);
        }

        .loading {
            display: none;
            text-align: center;
            padding: 30px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 480px) {
            body { padding: 10px; }
            .content { padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 QRIS Generator</h1>
            <p>SenPay Top Up Ready - Minimal Rp1.000</p>
        </div>

        <div class="content">
            <!-- QRIS GENERATOR -->
            <div class="qris-section">
                <h3>🎫 Generate QRIS</h3>
                <div class="form-group">
                    <label for="amount">💰 Nominal (Rp)</label>
                    <input type="number" id="amount" min="1000" placeholder="10000">
                </div>
                <div class="form-group">
                    <label for="reference">📝 Reference (Opsional)</label>
                    <input type="text" id="reference" placeholder="ML#Sajaad123">
                </div>
                <button class="btn-generate" onclick="generateQRIS()">
                    🎫 BUAT QRIS
                </button>
            </div>

            <!-- TOP UP PRODUCTS -->
            <div class="topup-section">
                <h3>🎮 Quick Top Up</h3>
                <div class="product-grid">
                    <div class="product-card" onclick="quickTopup(17000, 'ML Diamond 17')">
                        <div class="product-icon">⚔️</div>
                        <div>ML 17</div>
                        <div>Rp 17.000</div>
                    </div>
                    <div class="product-card" onclick="quickTopup(35000, 'ML Diamond 38')">
                        <div class="product-icon">⚔️</div>
                        <div>ML 38</div>
                        <div>Rp 35.000</div>
                    </div>
                    <div class="product-card" onclick="quickTopup(65000, 'ML Diamond 73')">
                        <div class="product-icon">⚔️</div>
                        <div>ML 73</div>
                        <div>Rp 65.000</div>
                    </div>
                    <div class="product-card" onclick="quickTopup(15000, 'FF Diamond 38')">
                        <div class="product-icon">🔫</div>
                        <div>FF 38</div>
                        <div>Rp 15.000</div>
                    </div>
                </div>
            </div>

            <!-- LOADING -->
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Generating QRIS...</p>
            </div>

            <!-- RESULT -->
            <div class="result" id="result">
                <h3 id="resultTitle">✅ QRIS Siap!</h3>
                <img id="qrisImg" class="qris-img" alt="QRIS">
                <div id="qrisInfo"></div>
                <button class="btn-copy" onclick="copyQRIS()">📋 Copy Link</button>
                <button class="btn-copy" onclick="downloadQRIS()">⬇️ Download</button>
            </div>
        </div>
    </div>

    <script>
        const QRIS_TOKEN = 'cki_MDT3cC14ASTcV9yCcZOEOROZFqVgNvZlWjsC5ofjrp3x2DBe';
        const SENPAY_TOKEN = '74|KYyrEsJM6IIz8YTgmtzQtbA5pytpVvsPvVpuFqr4022d9677';
        let currentQRIS = null;

        function formatRupiah(num) {
            return new Intl.NumberFormat('id-ID').format(num);
        }

        async function generateQRIS() {
            const amount = parseInt(document.getElementById('amount').value);
            const reference = document.getElementById('reference').value;

            if (!amount || amount < 1000) {
                alert('Minimal Rp 1.000!');
                return;
            }

            const btn = event.target;
            const loading = document.getElementById('loading');
            const result = document.getElementById('result');

            btn.disabled = true;
            btn.textContent = '⏳ Loading...';
            loading.style.display = 'block';
            result.style.display = 'none';

            try {
                const body = { amount };
                if (reference) body.payment_reference = reference;

                const response = await fetch('https://api.qrispy.id/api/payment/qris/generate', {
                    method: 'POST',
                    headers: {
                        'X-API-Token': QRIS_TOKEN,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(body)
                });

                const data = await response.json();

                if (data.status === 'success') {
                    currentQRIS = data.data;
                    showResult(data.data);
                } else {
                    throw new Error(data.message || 'QRIS failed');
                }
            } catch (error) {
                alert('Error: ' + error.message);
            } finally {
                btn.disabled = false;
                btn.textContent = '🎫 BUAT QRIS';
                loading.style.display = 'none';
            }
        }

        function showResult(qrisData) {
            document.getElementById('result').style.display = 'block';
            document.getElementById('qrisImg').src = qrisData.qris_image_url;
            document.getElementById('resultTitle').textContent = '✅ QRIS Siap Bayar!';
            document.getElementById('qrisInfo').innerHTML = `
                <div style="font-size: 24px; margin: 15px 0;">💰 ${formatRupiah(qrisData.amount)}</div>
                <div style="background: rgba(255,255,255,0.3); padding: 10px 20px; border-radius: 25px; display: inline-block;">
                    🆔 ${qrisData.qris_id}
                </div>
                <div style="margin-top: 15px; font-size: 14px; opacity: 0.9;">
                    Expires: ${new Date(qrisData.expired_at).toLocaleString('id-ID')}
                </div>
            `;
            document.getElementById('result').scrollIntoView({ behavior: 'smooth' });
        }

        function quickTopup(amount, reference) {
            document.getElementById('amount').value = amount;
            document.getElementById('reference').value = reference;
            generateQRIS();
        }

        function copyQRIS() {
            if (currentQRIS) {
                navigator.clipboard.writeText(currentQRIS.qris_image_url).then(() => {
                    alert('✅ Link QRIS copied!');
                });
            }
        }

        function downloadQRIS() {
            if (currentQRIS) {
                const a = document.createElement('a');
                a.href = currentQRIS.qris_image_url;
                a.download = `qris-${currentQRIS.qris_id}.png`;
                a.click();
            }
        }

        // Enter key support
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') generateQRIS();
        });

        // Auto format amount
        document.getElementById('amount').addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/\D/g, '');
        });
    </script>
</body>
</html>
