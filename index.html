<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QRIS DINAMIS YANTO</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #ff6b6b, #feca57);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .content {
            padding: 40px;
        }

        .form-section {
            background: #f8f9fa;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 16px;
        }

        input {
            width: 100%;
            padding: 18px;
            border: 2px solid #e1e5e9;
            border-radius: 12px;
            font-size: 18px;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .btn-generate, .btn-cancel {
            padding: 20px;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-generate {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-generate:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(102, 126, 234, 0.4);
        }

        .btn-cancel {
            background: linear-gradient(135deg, #ff416c, #ff4b2b);
            color: white;
        }

        .btn-cancel:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(255, 65, 108, 0.4);
        }

        .btn-generate:disabled, .btn-cancel:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .qris-result {
            text-align: center;
            padding: 40px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border-radius: 20px;
            color: white;
            display: none;
            margin-top: 30px;
            position: relative;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        .status-paid {
            background: linear-gradient(135deg, #56ab2f, #a8e6cf) !important;
            animation: celebrate 0.6s ease-in-out;
        }

        .status-cancelled {
            background: linear-gradient(135deg, #95a5a6, #7f8c8d) !important;
        }

        @keyframes celebrate {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .qris-image {
            max-width: 320px;
            width: 100%;
            height: auto;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            margin: 25px auto;
            display: block;
        }

        .qris-info {
            margin: 25px 0;
        }

        .info-item {
            display: inline-block;
            background: rgba(255,255,255,0.25);
            padding: 12px 25px;
            margin: 8px;
            border-radius: 30px;
            font-size: 16px;
            backdrop-filter: blur(10px);
        }

        .action-buttons {
            margin-top: 25px;
        }

        .btn-action {
            background: rgba(255,255,255,0.95);
            color: #333;
            border: none;
            padding: 12px 25px;
            margin: 8px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .btn-action:hover {
            background: white;
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }

        .spinner {
            border: 5px solid #f3f3f3;
            border-top: 5px solid #667eea;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
            margin: 0 auto 25px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .btn-group {
                grid-template-columns: 1fr;
                gap: 15px;
            }
            .content {
                padding: 25px;
            }
            .header h1 {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>QRIS GENERATOR</h1>
            <p>Generate QRIS Dinamis - Tanpa Minimal</p> <!-- ✅ Ubah teks -->
        </div>

        <div class="content">
            <div class="form-section">
                <div class="form-group">
                    <label for="amount">💰 Nominal (Rp)</label>
                    <!-- ✅ Hapus min="1000" & ubah placeholder -->
                    <input type="number" id="amount" min="0" step="1" placeholder="Masukkan nominal (tanpa batas minimal)" required>
                </div>

                <div class="btn-group">
                    <button class="btn-generate" onclick="generateQRIS()">
                        <span>🎫 HASILKAN QRIS</span>
                    </button>
                    <button class="btn-cancel" onclick="cancelCurrentQRIS()" id="btnCancel" style="display: none;">
                        <span>❌ Batalkan Pesanan</span>
                    </button>
                </div>
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p id="loadingText">Generating QRIS...</p>
            </div>

            <div class="qris-result" id="qrisResult">
                <h2 id="resultTitle">✅ QRIS Berhasil Dibuat!</h2>
                <img id="qrisImage" class="qris-image" alt="QRIS Code">
                <div class="qris-info" id="qrisInfo"></div>
                
                <div class="action-buttons">
                    <button class="btn-action" onclick="copyQRIS()">
                        📋 Copy Link QRIS
                    </button>
                    <button class="btn-action" onclick="downloadQRIS()">
                        ⬇️ Download PNG
                    </button>
                    <button class="btn-action" onclick="checkStatusNow()">
                        🔄 Cek Status
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_TOKEN = 'cki_MDT3cC14ASTcV9yCcZOEOROZFqVgNvZlWjsC5ofjrp3x2DBe';
        const API_URL = 'https://api.qrispy.id';
        let currentQRIS = null;

        function formatRupiah(angka) {
            return new Intl.NumberFormat('id-ID', {
                style: 'currency',
                currency: 'IDR',
                minimumFractionDigits: 0
            }).format(angka);
        }

        async function generateQRIS() {
            const amount = parseInt(document.getElementById('amount').value);

            // ✅ HAPUS validasi minimal 1000
            if (!amount || amount < 0) {
                alert('⚠️ Masukkan nominal yang valid (minimal Rp0)!');
                return;
            }

            const btnGenerate = document.querySelector('.btn-generate');
            const btnCancel = document.getElementById('btnCancel');
            const loading = document.getElementById('loading');
            const result = document.getElementById('qrisResult');

            btnGenerate.disabled = true;
            btnCancel.style.display = 'none';
            document.getElementById('loadingText').textContent = '🎫 Generating QRIS...';
            loading.style.display = 'block';
            result.style.display = 'none';

            try {
                const response = await fetch(`${API_URL}/api/payment/qris/generate`, {
                    method: 'POST',
                    headers: {
                        'X-API-Token': API_TOKEN,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ amount })
                });

                const data = await response.json();

                if (data.status === 'success') {
                    currentQRIS = data.data;
                    displayQRIS(data.data);
                    btnCancel.style.display = 'block';
                    startStatusCheck();
                } else {
                    throw new Error(data.message || 'Gagal generate QRIS');
                }
            } catch (error) {
                alert('❌ Error: ' + error.message);
            } finally {
                btnGenerate.disabled = false;
                loading.style.display = 'none';
            }
        }

        function displayQRIS(qrisData) {
            const result = document.getElementById('qrisResult');
            const image = document.getElementById('qrisImage');
            const info = document.getElementById('qrisInfo');
            const title = document.getElementById('resultTitle');

            image.src = qrisData.qris_image_url;
            title.textContent = '✅ QRIS Berhasil Dibuat!';
            result.className = 'qris-result';

            info.innerHTML = `
                <div class="info-item">💰 ${formatRupiah(qrisData.amount)}</div>
                <div class="info-item">🆔 ${qrisData.qris_id}</div>
                <div class="info-item">⏰ ${new Date(qrisData.expired_at).toLocaleString('id-ID')}</div>
            `;

            result.style.display = 'block';
            image.scrollIntoView({ behavior: 'smooth' });
        }

        async function cancelCurrentQRIS() {
            if (!currentQRIS) return;

            if (confirm(`❌ Batalkan QRIS ${currentQRIS.qris_id}?\n\nNominal: ${formatRupiah(currentQRIS.amount)}`)) {
                currentQRIS.status = 'cancelled';
                document.getElementById('qrisResult').classList.add('status-cancelled');
                document.getElementById('resultTitle').textContent = '❌ Pesanan Dibatalkan!';
                document.getElementById('btnCancel').style.display = 'none';
                stopStatusCheck();
                alert('✅ QRIS berhasil dibatalkan!');
            }
        }

        let statusInterval;
        function startStatusCheck() {
            stopStatusCheck();
            statusInterval = setInterval(checkStatus, 5000);
        }

        function stopStatusCheck() {
            if (statusInterval) {
                clearInterval(statusInterval);
                statusInterval = null;
            }
        }

        async function checkStatus() {
            if (!currentQRIS) return;

            try {
                const response = await fetch(
                    `${API_URL}/api/payment/qris/${currentQRIS.qris_id}/status`,
                    { headers: { 'X-API-Token': API_TOKEN } }
                );
                const data = await response.json();

                if (data.status && data.status !== 'pending') {
                    currentQRIS.status = data.status;
                    updateStatusDisplay(data.status);
                    stopStatusCheck();
                }
            } catch (error) {
                console.log('Status check failed:', error);
            }
        }

        async function checkStatusNow() {
            document.getElementById('loadingText').textContent = '🔄 Checking status...';
            document.getElementById('loading').style.display = 'block';
            await checkStatus();
            document.getElementById('loading').style.display = 'none';
        }

        function updateStatusDisplay(status) {
            const result = document.getElementById('qrisResult');
            const title = document.getElementById('resultTitle');

            result.classList.remove('status-paid', 'status-cancelled');
            
            switch(status) {
                case 'paid':
                    result.classList.add('status-paid');
                    title.textContent = '🎉 PEMBAYARAN SUKSES!';
                    document.getElementById('btnCancel').style.display = 'none';
                    break;
                case 'expired':
                    title.textContent = '⏰ QRIS KADALUARSA';
                    document.getElementById('btnCancel').style.display = 'none';
                    break;
                case 'cancelled':
                    result.classList.add('status-cancelled');
                    title.textContent = '❌ QRIS DIBATALKAN';
                    break;
            }
        }

        function copyQRIS() {
            if (currentQRIS) {
                navigator.clipboard.writeText(currentQRIS.qris_image_url).then(() => {
                    alert('✅ Link QRIS berhasil dicopy!\n\n' + currentQRIS.qris_image_url);
                });
            }
        }

        function downloadQRIS() {
            if (currentQRIS) {
                const link = document.createElement('a');
                link.href = currentQRIS.qris_image_url;
                link.download = `qris-${currentQRIS.qris_id}.png`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }
        }

        // Init - ✅ Ubah validasi input
        document.getElementById('amount').addEventListener('input', function(e) {
            let value = e.target.value.replace(/\D/g, '');
            e.target.value = value || ''; // Izinkan kosong
        });

        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') generateQRIS();
        });
    </script>
</body>
</html>
