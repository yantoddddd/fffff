<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QRIS Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 450px;
            width: 100%;
            background: white;
            border-radius: 25px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #ff6b6b, #feca57);
            color: white;
            padding: 35px 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.3em;
            margin-bottom: 8px;
        }

        .content {
            padding: 40px 30px 30px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: #333;
            font-size: 16px;
        }

        input {
            width: 100%;
            padding: 18px;
            border: 2px solid #e9ecef;
            border-radius: 15px;
            font-size: 18px;
            transition: all 0.3s ease;
            background: #f8f9fa;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
            background: white;
        }

        input::placeholder {
            color: #adb5bd;
        }

        .btn-generate {
            width: 100%;
            padding: 20px;
            border: none;
            border-radius: 18px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }

        .btn-generate:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.4);
        }

        .btn-generate:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .result {
            text-align: center;
            padding: 40px 30px;
            background: linear-gradient(135deg, #56ab2f, #a8e6cf);
            border-radius: 20px;
            color: white;
            display: none;
            margin-top: 30px;
            box-shadow: 0 15px 40px rgba(86, 171, 47, 0.3);
        }

        .qris-image {
            max-width: 320px;
            width: 100%;
            height: auto;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            margin: 25px auto;
            display: block;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin: 25px 0;
        }

        .info-item {
            background: rgba(255,255,255,0.25);
            padding: 15px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            font-weight: 600;
        }

        .btn-action {
            background: rgba(255,255,255,0.95);
            color: #333;
            border: none;
            padding: 15px 30px;
            margin: 10px 5px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 700;
            font-size: 16px;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .btn-action:hover {
            background: white;
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }

        .spinner {
            border: 5px solid #f3f3f3;
            border-top: 5px solid #667eea;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
            margin: 0 auto 25px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 480px) {
            body { padding: 15px; }
            .content { padding: 25px 20px; }
            .header h1 { font-size: 1.9em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎫 QRIS Generator</h1>
            <p>Dinamis • Instan • Minimal Rp1.000</p>
        </div>

        <div class="content">
            <div class="form-group">
                <label for="amount">💰 Nominal Pembayaran</label>
                <input type="number" id="amount" min="1000" placeholder="10000" required>
            </div>

            <div class="form-group">
                <label for="reference">📝 Order Reference (Opsional)</label>
                <input type="text" id="reference" placeholder="Order #12345 atau ML-Sajaad#123">
            </div>

            <button class="btn-generate" onclick="generateQRIS()">
                🚀 Generate QRIS
            </button>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Menggenerate QRIS...</p>
            </div>

            <div class="result" id="result">
                <h3 id="resultTitle">✅ QRIS Siap Digunakan!</h3>
                <img id="qrisImage" class="qris-image" alt="QRIS Code">
                <div class="info-grid" id="qrisInfo"></div>
                <div>
                    <button class="btn-action" onclick="copyQRIS()">📋 Salin Link</button>
                    <button class="btn-action" onclick="downloadQRIS()">⬇️ Download PNG</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_TOKEN = 'cki_MDT3cC14ASTcV9yCcZOEOROZFqVgNvZlWjsC5ofjrp3x2DBe';
        let currentQRIS = null;

        function formatRupiah(angka) {
            return new Intl.NumberFormat('id-ID', {
                style: 'currency',
                currency: 'IDR',
                minimumFractionDigits: 0
            }).format(angka);
        }

        async function generateQRIS() {
            const amount = parseInt(document.getElementById('amount').value);
            const reference = document.getElementById('reference').value.trim();

            if (!amount || amount < 1000) {
                alert('Minimal nominal Rp 1.000!');
                document.getElementById('amount').focus();
                return;
            }

            const btn = event.target;
            const loading = document.getElementById('loading');
            const result = document.getElementById('result');

            // UI States
            btn.disabled = true;
            btn.textContent = '⏳ Menghasilkan...';
            loading.style.display = 'block';
            result.style.display = 'none';

            try {
                const body = { amount };
                if (reference) body.payment_reference = reference.slice(0, 50);

                const response = await fetch('https://api.qrispy.id/api/payment/qris/generate', {
                    method: 'POST',
                    headers: {
                        'X-API-Token': API_TOKEN,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(body)
                });

                const data = await response.json();

                if (data.status === 'success') {
                    currentQRIS = data.data;
                    displayResult(data.data);
                } else {
                    throw new Error(data.message || 'Gagal generate QRIS');
                }
            } catch (error) {
                alert('Error: ' + (error.message || 'Terjadi kesalahan'));
            } finally {
                btn.disabled = false;
                btn.textContent = '🚀 Generate QRIS';
                loading.style.display = 'none';
            }
        }

        function displayResult(qrisData) {
            const result = document.getElementById('result');
            const image = document.getElementById('qrisImage');
            const info = document.getElementById('qrisInfo');
            const title = document.getElementById('resultTitle');

            image.src = qrisData.qris_image_url;
            title.textContent = '✅ QRIS Siap Digunakan!';
            
            info.innerHTML = `
                <div class="info-item">
                    <div style="font-size: 20px; margin-bottom: 5px;">💰</div>
                    ${formatRupiah(qrisData.amount)}
                </div>
                <div class="info-item">
                    <div style="font-size: 20px; margin-bottom: 5px;">🆔</div>
                    ${qrisData.qris_id}
                </div>
                <div class="info-item">
                    <div style="font-size: 20px; margin-bottom: 5px;">⏰</div>
                    ${new Date(qrisData.expired_at).toLocaleString('id-ID')}
                </div>
                ${qrisData.payment_reference ? `
                <div class="info-item">
                    <div style="font-size: 20px; margin-bottom: 5px;">📝</div>
                    ${qrisData.payment_reference}
                </div>` : ''}
            `;

            result.style.display = 'block';
            image.scrollIntoView({ behavior: 'smooth' });
        }

        function copyQRIS() {
            if (currentQRIS) {
                navigator.clipboard.writeText(currentQRIS.qris_image_url).then(() => {
                    alert('✅ Link QRIS disalin ke clipboard!\n\n' + currentQRIS.qris_image_url);
                }).catch(() => {
                    prompt('Copy this link:', currentQRIS.qris_image_url);
                });
            }
        }

        function downloadQRIS() {
            if (currentQRIS) {
                const link = document.createElement('a');
                link.href = currentQRIS.qris_image_url;
                link.download = `qris-${currentQRIS.qris_id}.png`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }
        }

        // Keyboard support
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !document.querySelector('.btn-generate:disabled')) {
                generateQRIS();
            }
        });

        // Auto-format amount
        document.getElementById('amount').addEventListener('input', function(e) {
            let value = e.target.value.replace(/\D/g, '');
            if (value) {
                e.target.value = parseInt(value);
            }
        });

        // Focus first input
        window.onload = () => document.getElementById('amount').focus();
    </script>
</body>
</html>
