<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QRIS Auto Gen</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;padding:20px}
.container{max-width:600px;margin:0 auto;background:white;border-radius:20px;box-shadow:0 20px 40px rgba(0,0,0,.1);position:relative;overflow:hidden}

/* Hamburger Menu */
.header{position:relative;background:linear-gradient(135deg,#ff6b6b,#feca57);color:white;padding:25px;text-align:center;border-radius:20px 20px 0 0}
.hamburger{position:absolute;left:20px;top:25px;z-index:1000;background:none;border:none;color:white;font-size:24px;cursor:pointer;padding:10px;transition:all .3s}
.hamburger:hover{transform:scale(1.1)}
.menu-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:999;display:none;animation:fadeIn .3s}
.menu-panel{position:fixed;top:0;left:-300px;width:300px;height:100%;background:linear-gradient(135deg,#667eea,#764ba2);z-index:1000;padding:80px 30px 30px;transition:all .4s cubic-bezier(0.68,-0.55,0.265,1.55);box-shadow:5px 0 30px rgba(0,0,0,.3)}
.menu-panel.open{left:0}
.menu-item{display:block;padding:20px 0;color:white;text-decoration:none;font-size:18px;font-weight:600;border-bottom:1px solid rgba(255,255,255,.1);transition:all .3s}
.menu-item:hover{background:rgba(255,255,255,.1);padding-left:20px;border-radius:10px}
.menu-close{position:absolute;top:20px;right:20px;background:none;border:none;color:white;font-size:28px;cursor:pointer}
h1{font-size:2em;margin:0}
.content{padding:30px}
label{display:block;margin-bottom:10px;font-weight:600}
input{width:100%;padding:15px;border:2px solid #ddd;border-radius:10px;font-size:18px}
.btn-group{display:grid;grid-template-columns:1fr;gap:15px;margin:20px 0}
button{padding:15px;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer}
.btn-gen{background:linear-gradient(135deg,#667eea,#764ba2);color:white}
.btn-cancel{background:linear-gradient(135deg,#ff416c,#ff4b2b);color:white}
button:hover{transform:translateY(-2px)}
button:disabled{opacity:.6;cursor:not-allowed}
.qris-result{padding:30px;text-align:center;background:linear-gradient(135deg,#f093fb,#f5576c);color:white;border-radius:20px;display:none;margin-top:20px;position:relative}
.qris-img{max-width:280px;width:100%;border-radius:15px;margin:20px auto;display:block}
.info{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;margin:20px 0}
.info-item{background:rgba(255,255,255,.3);padding:10px 20px;border-radius:25px;font-size:15px}
.countdown{background:linear-gradient(135deg,#ff6b6b,#ff8e8e);padding:15px;border-radius:15px;margin:15px 0;font-size:18px;font-weight:600}
.expired{animation:pulse 1s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.loading{display:none;text-align:center;padding:30px}
.spinner{width:50px;height:50px;border:4px solid #f3f3f3;border-top:4px solid #667eea;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 20px}
@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
@media(max-width:600px){
    .menu-panel{width:100%;left:-100%}
    .info{flex-direction:column;align-items:center}
    .hamburger{left:15px;top:20px}
}
</style>
</head>
<body>
<!-- Menu Overlay -->
<div class="menu-overlay" id="menuOverlay" onclick="closeMenu()"></div>

<!-- Menu Panel -->
<div class="menu-panel" id="menuPanel">
    <button class="menu-close" onclick="closeMenu()">×</button>
    <a href="/" class="menu-item">🏠 QRIS Generator</a>
    <a href="/topup-dana" class="menu-item">💰 Topup Dana</a>
    <a href="#" class="menu-item" onclick="showBalance()">💳 Saldo Saya</a>
    <a href="#" class="menu-item" onclick="showHistory()">📋 Riwayat</a>
    <hr style="border:0;height:1px;background:rgba(255,255,255,.2);margin:20px 0">
    <a href="#" class="menu-item" style="font-size:14px;color:rgba(255,255,255,.7)">ℹ️ Bantuan</a>
</div>

<div class="container">
<div class="header">
<button class="hamburger" id="hamburgerBtn" onclick="toggleMenu()">☰</button>
<h1>🚀 QRIS Generator</h1>
<p>Min Rp100 | Auto Renew</p>
</div>
<div class="content">
<div>
<label>💰 Nominal (Rp)</label>
<input type="number" id="amount" min="100" placeholder="Min Rp100">
<div class="btn-group">
<button class="btn-gen" id="btnGen" onclick="generate()">⚡ Generate</button>
</div>
</div>
<div class="loading" id="loading">
<div class="spinner"></div>
<p id="loadingText">Processing...</p>
</div>
<div class="qris-result" id="qrisResult">
<h2 id="title">QRIS Ready</h2>
<img id="qrisImg" class="qris-img" alt="QRIS">
<div class="countdown" id="countdown">
⏰ Expired in: <span id="timer">--:--:--</span>
</div>
<div class="info" id="info"></div>
<button class="btn-cancel" onclick="cancelQRIS()" id="btnCancel" style="width:100%;margin-top:15px">❌ Cancel</button>
<div style="margin-top:20px">
<button onclick="copyQRIS()" style="background:rgba(255,255,255,.9);color:#333;padding:10px 20px;border-radius:25px;margin:5px;cursor:pointer;border:none">📋 Copy</button>
<button onclick="downloadQRIS()" style="background:rgba(255,255,255,.9);color:#333;padding:10px 20px;border-radius:25px;margin:5px;cursor:pointer;border:none">⬇️ Download</button>
</div>
</div>
</div>
</div>

<script>
const TOKEN='cki_MDT3cC14ASTcV9yCcZOEOROZFqVgNvZlWjsC5ofjrp3x2DBe';const API='https://api.qrispy.id';let currentQRIS=null;let generating=false;let allQRIS=[];let countdownInterval;

// Menu Functions
function toggleMenu() {
    document.getElementById('menuPanel').classList.toggle('open');
    document.getElementById('menuOverlay').style.display = 'block';
}

function closeMenu() {
    document.getElementById('menuPanel').classList.remove('open');
    document.getElementById('menuOverlay').style.display = 'none';
}

function showBalance() {
    alert('💰 Saldo Anda: Rp 250.000\n\nFitur lengkap segera hadir!');
    closeMenu();
}

function showHistory() {
    alert('📋 Riwayat QRIS\n\nFitur lengkap segera hadir!');
    closeMenu();
}

const formatRp=n=>new Intl.NumberFormat('id-ID',{style:'currency',currency:'IDR',minimumFractionDigits:0}).format(n);
function formatTime(seconds){const h=Math.floor(seconds/3600);const m=Math.floor((seconds%3600)/60);const s=seconds%60;return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`}
function startCountdown(expiredAt){clearInterval(countdownInterval);const updateTimer=()=>{const now=new Date().getTime();const distance=expiredAt-now;if(distance<0){clearInterval(countdownInterval);document.getElementById('timer').textContent='00:00:00';document.getElementById('timer').parentElement.classList.add('expired');setTimeout(generate,1000);return}document.getElementById('timer').textContent=formatTime(Math.floor(distance/1000))};updateTimer();countdownInterval=setInterval(updateTimer,1000)}
async function genSingle(){const amt=parseInt(document.getElementById('amount').value);if(!amt||amt<100){alert('Min Rp100');return null}document.getElementById('loading').style.display='block';try{const res=await fetch(`${API}/api/payment/qris/generate`,{method:'POST',headers:{'X-API-Token':TOKEN,'Content-Type':'application/json'},body:JSON.stringify({amount:amt})});const data=await res.json();if(data.status==='success'){return data.data}else throw data.message}catch(e){console.log('Error:',e);return null}finally{document.getElementById('loading').style.display='none'}}
async function cancelQRISID(qrisId){try{await fetch(`${API}/api/payment/qris/${qrisId}/cancel`,{method:'POST',headers:{'X-API-Token':TOKEN}})}catch(e){console.log('Cancel:',e)}}
async function generate(){if(generating)return;generating=true;document.getElementById('btnGen').disabled=true;document.getElementById('qrisResult').style.display='none';allQRIS=[];try{for(let i=0;i<5;i++){const qris=await genSingle();if(qris){allQRIS.push(qris)}}}finally{generating=false;document.getElementById('btnGen').disabled=false;processQRIS()}}
function processQRIS(){const candidates=allQRIS.filter((_,i)=>i>=2);const randomIdx=Math.floor(Math.random()*candidates.length);const selected=candidates[randomIdx];const toCancel=allQRIS.filter(q=>q.qris_id!==selected.qris_id);toCancel.forEach(q=>cancelQRISID(q.qris_id));currentQRIS=selected;displayQRIS(currentQRIS)}
function displayQRIS(data){document.getElementById('qrisImg').src=data.qris_image_url;document.getElementById('title').textContent='QRIS Ready';document.getElementById('info').innerHTML=`<div class="info-item">💰 ${formatRp(data.amount)}</div><div class="info-item">📅 ${new Date(data.created_at).toLocaleDateString('id-ID')} ${new Date(data.created_at).toLocaleTimeString('id-ID')}</div><div class="info-item">🆔 ${data.qris_id}</div>`;document.getElementById('qrisResult').style.display='block';document.getElementById('btnCancel').style.display='block';document.getElementById('countdown').classList.remove('expired');const expiredAt=new Date(data.expired_at).getTime();startCountdown(expiredAt);document.getElementById('qrisResult').scrollIntoView()}
async function cancelQRIS(){if(!currentQRIS)return;clearInterval(countdownInterval);await cancelQRISID(currentQRIS.qris_id);document.getElementById('title').textContent='❌ Cancelled';document.getElementById('btnCancel').style.display='none'}
function copyQRIS(){if(currentQRIS)navigator.clipboard.writeText(currentQRIS.qris_image_url).then(()=>alert('✅ Link copied!'))}
function downloadQRIS(){if(currentQRIS){const a=document.createElement('a');a.href=currentQRIS.qris_image_url;a.download=`qris-${currentQRIS.qris_id}.png`;a.click()}}
document.getElementById('amount').addEventListener('input',e=>{e.target.value=e.target.value.replace(/\D/g,'')});
document.addEventListener('keypress',e=>{if(e.key==='Enter')generate()});
</script>
</body>
</html>
