<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QRIS Auto Gen - Premium</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root {
  --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  --success-gradient: linear-gradient(135deg, #10b981 0%, #059669 100%);
  --danger-gradient: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
  --warning-gradient: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
  --info-gradient: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
  --shadow: 0 25px 50px rgba(0,0,0,0.15);
  --shadow-hover: 0 35px 70px rgba(0,0,0,0.25);
  --glass: rgba(255,255,255,0.25);
  --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

body {
  font-family: 'Poppins', sans-serif;
  background: var(--primary-gradient);
  min-height: 100vh;
  padding: 20px;
  overflow-x: hidden;
}

.container {
  max-width: 650px;
  margin: 0 auto;
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(20px);
  border-radius: 30px;
  box-shadow: var(--shadow);
  overflow: hidden;
  position: relative;
}

.container::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 6px;
  background: var(--success-gradient);
}

.header {
  background: var(--warning-gradient);
  color: white;
  padding: 40px 30px;
  text-align: center;
  position: relative;
  overflow: hidden;
}

.header::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(255,255,255,0.3) 0%, transparent 70%);
  animation: float 6s ease-in-out infinite;
}

@keyframes float {
  0%, 100% { transform: translateY(0px) rotate(0deg); }
  50% { transform: translateY(-20px) rotate(180deg); }
}

h1 {
  font-size: 2.8em;
  font-weight: 900;
  margin: 0;
  letter-spacing: -2px;
  text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
}

.header p {
  font-size: 1.1em;
  opacity: 0.95;
  margin-top: 10px;
  font-weight: 500;
}

.balance-section {
  background: var(--success-gradient);
  color: white;
  padding: 35px;
  text-align: center;
  margin: 30px;
  border-radius: 25px;
  box-shadow: var(--shadow);
  position: relative;
  overflow: hidden;
}

.balance-section::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
  animation: shimmer 3s infinite;
}

@keyframes shimmer {
  0% { left: -100%; }
  100% { left: 100%; }
}

.balance-title {
  font-size: 1.3em;
  margin-bottom: 15px;
  font-weight: 600;
  letter-spacing: 1px;
  opacity: 0.95;
}

.balance-amount {
  font-size: 3.2em;
  font-weight: 900;
  text-shadow: 3px 3px 15px rgba(0,0,0,0.4);
  margin-bottom: 10px;
  background: linear-gradient(45deg, #fff, rgba(255,255,255,0.8));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.content {
  padding: 50px 40px 40px;
}

label {
  display: block;
  margin-bottom: 15px;
  font-weight: 700;
  color: #2d3748;
  font-size: 1.1em;
  display: flex;
  align-items: center;
  gap: 10px;
}

input {
  width: 100%;
  padding: 22px 25px;
  border: 3px solid #e2e8f0;
  border-radius: 20px;
  font-size: 1.4em;
  font-weight: 600;
  background: linear-gradient(145deg, #ffffff, #f8fafc);
  transition: var(--transition);
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

input:focus {
  border-color: #10b981;
  outline: none;
  box-shadow: 0 0 0 4px rgba(16,185,129,0.2), 0 20px 40px rgba(16,185,129,0.15);
  transform: translateY(-2px);
}

.btn-group {
  display: grid;
  grid-template-columns: 1fr;
  gap: 20px;
  margin: 35px 0;
}

button {
  padding: 22px 30px;
  border: none;
  border-radius: 20px;
  font-size: 1.3em;
  font-weight: 700;
  cursor: pointer;
  transition: var(--transition);
  box-shadow: 0 15px 35px rgba(0,0,0,0.15);
  position: relative;
  overflow: hidden;
}

.btn-gen {
  background: var(--primary-gradient);
  color: white;
}

.btn-cancel {
  background: var(--danger-gradient);
  color: white;
}

.btn-gen:hover, .btn-cancel:hover {
  transform: translateY(-5px) scale(1.02);
  box-shadow: var(--shadow-hover);
}

button:disabled {
  opacity: 0.6;
  cursor: not-allowed;
  transform: none;
}

.qris-result {
  padding: 45px;
  text-align: center;
  background: var(--info-gradient);
  color: white;
  border-radius: 30px;
  display: none;
  margin-top: 30px;
  box-shadow: var(--shadow);
}

.qris-img {
  max-width: 320px;
  width: 100%;
  border-radius: 25px;
  margin: 30px auto;
  display: block;
  box-shadow: 0 30px 60px rgba(0,0,0,0.3);
  transition: var(--transition);
}

.qris-img:hover {
  transform: scale(1.02);
}

.info {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 15px;
  margin: 30px 0;
}

.info-item {
  background: var(--glass);
  padding: 18px 30px;
  border-radius: 50px;
  font-size: 1.1em;
  font-weight: 600;
  backdrop-filter: blur(20px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  transition: var(--transition);
}

.info-item:hover {
  transform: translateY(-3px);
  box-shadow: 0 20px 40px rgba(0,0,0,0.3);
}

.countdown {
  background: var(--danger-gradient);
  padding: 25px;
  border-radius: 25px;
  margin: 25px 0;
  font-size: 1.4em;
  font-weight: 700;
}

.loading {
  display: none;
  text-align: center;
  padding: 60px;
}

.spinner {
  width: 80px;
  height: 80px;
  border: 6px solid #f3f3f3;
  border-top: 6px solid #667eea;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin: 0 auto 30px;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

@media (max-width: 600px) {
  .info { flex-direction: column; align-items: center; }
  .info-item { width: 100%; text-align: center; }
  h1 { font-size: 2.2em; }
  .balance-amount { font-size: 2.5em; }
}
</style>
</head>
<body>
<div class="container">
<div class="header">
<h1><i class="fas fa-qrcode"></i> QRIS Generator</h1>
<p><i class="fas fa-bolt"></i> Min Rp100 | Auto Renew | Premium</p>
</div>

<div class="content">
<div>
<label><i class="fas fa-money-bill-wave"></i> Nominal (Rp)</label>
<input type="number" id="amount" min="100" placeholder="Masukkan nominal minimal Rp100">
<div class="btn-group">
<button class="btn-gen" id="btnGen" onclick="generate()">
<i class="fas fa-magic"></i> Generate QRIS
</button>
</div>
</div>

<div class="loading" id="loading">
<div class="spinner"></div>
<p id="loadingText">🔄 Menghasilkan QRIS terbaik...</p>
</div>

<div class="qris-result" id="qrisResult">
<h2 id="title"><i class="fas fa-check-circle"></i> QRIS Siap!</h2>
<img id="qrisImg" class="qris-img" alt="QRIS Code">
<div class="countdown" id="countdown">
⏰ <i class="fas fa-clock"></i> Berakhir dalam: <span id="timer">05:00</span>
</div>
<div class="info" id="info"></div>
<button class="btn-cancel" onclick="cancelQRIS()" id="btnCancel">
<i class="fas fa-times-circle"></i> Batalkan QRIS
</button>
<div style="margin-top:30px">
<button onclick="copyQRIS()" style="background:var(--glass);color:white;padding:20px 40px;border-radius:25px;margin:10px;font-weight:700;font-size:1.1em;box-shadow:var(--shadow)">
<i class="fas fa-copy"></i> Salin Link
</button>
<button onclick="downloadQRIS()" style="background:var(--glass);color:white;padding:20px 40px;border-radius:25px;margin:10px;font-weight:700;font-size:1.1em;box-shadow:var(--shadow)">
<i class="fas fa-download"></i> Download PNG
</button>
</div>
</div>
</div>
</div>

<script>
const TOKEN='cki_MDT3cC14ASTcV9yCcZOEOROZFqVgNvZlWjsC5ofjrp3x2DBe';
const API='https://api.qrispy.id';
let currentQRIS=null, generating=false, allQRIS=[], countdownInterval;

const formatRp=n=>new Intl.NumberFormat('id-ID',{style:'currency',currency:'IDR',minimumFractionDigits:0}).format(n);

function formatTime(s){const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),t=s%60;return`${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${t.toString().padStart(2,'0')}`}

function startCountdown(expiredAt){
  clearInterval(countdownInterval);
  const update=()=>{
    const now=new Date().getTime(),distance=expiredAt-now;
    if(distance<0){
      clearInterval(countdownInterval);
      document.getElementById('timer').textContent='00:00:00';
      document.getElementById('countdown').style.background='var(--danger-gradient)';
      setTimeout(generate,1000);
      return;
    }
    document.getElementById('timer').textContent=formatTime(Math.floor(distance/1000));
  };
  update();countdownInterval=setInterval(update,1000);
}

async function genSingle(){
  const amt=parseInt(document.getElementById('amount').value);
  if(!amt||amt<100){alert('Minimal Rp 100!');return null}
  document.getElementById('loading').style.display='block';
  try{
    const res=await fetch(`${API}/api/payment/qris/generate`,{
      method:'POST',
      headers:{'X-API-Token':TOKEN,'Content-Type':'application/json'},
      body:JSON.stringify({amount:amt})
    });
    const data=await res.json();
    if(data.status==='success')return data.data;
    throw data.message;
  }catch(e){
    console.error('Error:',e);
    return null;
  }finally{
    document.getElementById('loading').style.display='none';
  }
}

async function cancelQRISID(qrisId){
  try{
    await fetch(`${API}/api/payment/qris/${qrisId}/cancel`,{
      method:'POST',headers:{'X-API-Token':TOKEN}
    });
  }catch(e){}
}

async function generate(){
  if(generating)return;
  generating=true;
  document.getElementById('btnGen').disabled=true;
  document.getElementById('qrisResult').style.display='none';
  allQRIS=[];
  document.getElementById('loadingText').textContent='🔄 Menghasilkan 5 QRIS...';
  
  try{
    for(let i=0;i<5;i++){
      const qris=await genSingle();
      if(qris)allQRIS.push(qris);
      document.getElementById('loadingText').textContent=`✅ ${i+1}/5 QRIS selesai`;
    }
  }finally{
    generating=false;
    document.getElementById('btnGen').disabled=false;
    if(allQRIS.length)processQRIS();
  }
}

function processQRIS(){
  const candidates=allQRIS.filter((_,i)=>i>=2);
  const randomIdx=Math.floor(Math.random()*candidates.length);
  const selected=candidates[randomIdx];
  allQRIS.filter(q=>q.qris_id!==selected.qris_id).forEach(q=>cancelQRISID(q.qris_id));
  currentQRIS=selected;
  displayQRIS(currentQRIS);
}

function displayQRIS(data){
  document.getElementById('qrisImg').src=data.qris_image_url;
  document.getElementById('title').innerHTML='<i class="fas fa-check-circle"></i> QRIS Siap Digunakan!';
  document.getElementById('info').innerHTML=`
    <div class="info-item"><i class="fas fa-money-bill-wave"></i> ${formatRp(data.amount)}</div>
    <div class="info-item"><i class="fas fa-calendar"></i> ${new Date(data.created_at).toLocaleString('id-ID')}</div>
    <div class="info-item"><i class="fas fa-fingerprint"></i> ${data.qris_id.slice(0,16)}...</div>
  `;
  document.getElementById('qrisResult').style.display='block';
  document.getElementById('btnCancel').style.display='block';
  document.getElementById('countdown').classList.remove('expired');
  startCountdown(new Date(data.expired_at).getTime());
  document.getElementById('qrisResult').scrollIntoView({behavior:'smooth'});
}

async function cancelQRIS(){
  if(!currentQRIS)return;
  clearInterval(countdownInterval);
  await cancelQRISID(currentQRIS.qris_id);
  document.getElementById('title').innerHTML='<i class="fas fa-times-circle"></i> QRIS Dibatalkan';
  document.getElementById('btnCancel').style.display='none';
}

function copyQRIS(){
  if(currentQRIS){
    navigator.clipboard.writeText(currentQRIS.qris_image_url).then(()=>{
      const btn=document.querySelector('button[onclick="copyQRIS()"]');
      const original=btn.innerHTML;
      btn.innerHTML='<i class="fas fa-check"></i> Tersalin!';
      btn.style.background='var(--success-gradient)';
      setTimeout(()=>{
        btn.innerHTML=original;
        btn.style.background='var(--glass)';
      },1500);
    });
  }
}

function downloadQRIS(){
  if(currentQRIS){
    const a=document.createElement('a');
    a.href=currentQRIS.qris_image_url;
    a.download=`qris-${currentQRIS.qris_id.slice(0,8)}.png`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }
}

document.getElementById('amount').addEventListener('input',e=>e.target.value=e.target.value.replace(/\D/g,''));
document.addEventListener('keypress',e=>{if(e.key==='Enter')generate()});
</script>
</body>
</html>
