<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QRIS GENERATOR</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #ff6b6b, #feca57);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2em;
            margin-bottom: 5px;
        }

        .content {
            padding: 40px;
        }

        .form-section {
            background: #f8f9fa;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 18px;
            border: 2px solid #e1e5e9;
            border-radius: 12px;
            font-size: 18px;
            margin-bottom: 20px;
            text-align: center;
        }

        .btn-generate {
            width: 100%;
            padding: 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-generate:hover:not(:disabled) {
            transform: translateY(-2px);
        }

        .btn-generate:disabled {
            opacity: 0.6;
        }

        .qris-result {
            text-align: center;
            padding: 30px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border-radius: 15px;
            color: white;
            display: none;
            margin-top: 20px;
        }

        .qris-result.paid {
            background: linear-gradient(135deg, #56ab2f, #a8e6cf) !important;
            animation: bounce 0.6s;
        }

        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .sixth-try {
            background: rgba(255,215,0,0.2) !important;
            border: 3px solid #ffd700;
        }

        .qris-img {
            max-width: 100%;
            height: 250px;
            object-fit: contain;
            border-radius: 12px;
            margin: 20px 0;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .status {
            padding: 12px 24px;
            background: rgba(255,193,7,0.3);
            color: #856404;
            border-radius: 25px;
            font-weight: bold;
            display: inline-block;
            margin: 15px 0;
        }

        .status.paid {
            background: rgba(40,167,69,0.4);
            color: white;
        }

        .loading {
            text-align: center;
            padding: 60px;
            display: none;
        }

        .spinner {
            border: 5px solid #f3f3f3;
            border-top: 5px solid #667eea;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
            margin: 0 auto 25px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .actions {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }

        .btn-action {
            flex: 1;
            padding: 12px;
            background: rgba(255,255,255,0.9);
            color: #333;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-action:hover {
            background: white;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>QRIS GENERATOR</h1>
            <p>Try 6x - Ambil #6 (100% Murah)</p>
        </div>

        <div class="content">
            <div class="form-section">
                <input type="number" id="amount" placeholder="Nominal">
                <button class="btn-generate" onclick="generate6th()">GET #6 MURAH</button>
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p id="loadingText">Try 1/6...</p>
            </div>

            <div class="qris-result sixth-try" id="qrisResult">
                <div>🔥 QRIS KE-6 (MURAH!)</div>
                <img id="qrisImg" class="qris-img" src="">
                <div id="amountDisplay"></div>
                <div class="status pending" id="status">Pending</div>
                
                <div class="actions">
                    <button class="btn-action" onclick="copyLink()">📋 Copy</button>
                    <button class="btn-action" onclick="downloadImg()">⬇️ DL</button>
                    <button class="btn-action" onclick="checkNow()">🔍 Check</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_TOKEN = 'cki_MDT3cC14ASTcV9yCcZOEOROZFqVgNvZlWjsC5ofjrp3x2DBe';
        const API_URL = 'https://api.qrispy.id';
        let currentQRIS = null;

        // ✅ LANGSUNG TRY KE-6
        async function generate6th() {
            const amount = parseInt(document.getElementById('amount').value) || 0;
            
            const btn = document.querySelector('.btn-generate');
            const loading = document.getElementById('loading');
            const result = document.getElementById('qrisResult');

            btn.disabled = true;
            btn.textContent = 'Try 6x...';
            loading.style.display = 'block';
            result.style.display = 'none';

            try {
                // ✅ SKIP 1-5, LANGSUNG TRY KE-6
                for (let i = 1; i <= 5; i++) {
                    document.getElementById('loadingText').textContent = `Skip ${i}/6...`;
                    await new Promise(r => setTimeout(r, 300)); // Fake delay
                }
                
                document.getElementById('loadingText').textContent = 'Get #6 MURAH!';
                
                const res = await fetch(`${API_URL}/api/payment/qris/generate`, {
                    method: 'POST',
                    headers: {
                        'X-API-Token': API_TOKEN,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({amount})
                });
                
                const data = await res.json();
                if (data.status !== 'success') {
                    throw new Error('Try #6 gagal');
                }
                
                currentQRIS = data.data;
                displayQRIS();
                startCheck();

            } catch(e) {
                alert('Gagal: ' + e.message);
            } finally {
                btn.disabled = false;
                btn.textContent = 'GET #6 MURAH';
                loading.style.display = 'none';
            }
        }

        function displayQRIS() {
            const result = document.getElementById('qrisResult');
            document.getElementById('qrisImg').src = currentQRIS.qris_image_url;
            document.getElementById('amountDisplay').textContent = formatRupiah(currentQRIS.amount);
            document.getElementById('status').textContent = 'Pending';
            
            result.style.display = 'block';
            result.scrollIntoView({behavior: 'smooth'});
        }

        let checkInterval;
        function startCheck() {
            let count = 0;
            checkInterval = setInterval(async () => {
                count++;
                try {
                    const res = await fetch(`${API_URL}/api/payment/qris/${currentQRIS.qris_id}/status`, {
                        headers: {'X-API-Token': API_TOKEN}
                    });
                    const data = await res.json();
                    
                    const statusEl = document.getElementById('status');
                    
                    if (data.status === 'paid') {
                        statusEl.textContent = 'PAID ✅';
                        document.getElementById('qrisResult').classList.add('paid');
                        clearInterval(checkInterval);
                        alert('🎉 PAID DETECTED!');
                        return;
                    }
                } catch(e) {}
                
                if (count > 15) clearInterval(checkInterval);
            }, 7000);
        }

        function formatRupiah(n) {
            return new Intl.NumberFormat('id-ID').format(n);
        }

        function copyLink() {
            navigator.clipboard.writeText(currentQRIS.qris_image_url);
            alert('✅ Link QRIS copied!');
        }

        function downloadImg() {
            const a = document.createElement('a');
            a.href = currentQRIS.qris_image_url;
            a.download = `qris-murah.png`;
            a.click();
        }

        async function checkNow() {
            document.getElementById('loadingText').textContent = 'Checking...';
            document.getElementById('loading').style.display = 'block';
            await fetch(`${API_URL}/api/payment/qris/${currentQRIS.qris_id}/status`, {
                headers: {'X-API-Token': API_TOKEN}
            });
            document.getElementById('loading').style.display = 'none';
        }

        document.getElementById('amount').addEventListener('input', function(e) {
            e.target.value = e.target.value.replace(/\D/g, '');
        });

        document.addEventListener('keypress', e => {
            if (e.key === 'Enter') generate6th();
        });
    </script>
</body>
</html>
