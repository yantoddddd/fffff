<!DOCTYPE html><html lang="id"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>QRIS + NOKOS Auto</title><link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@400;700;900&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:Poppins,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}.container{max-width:400px;margin:0 auto;background:rgba(255,255,255,0.95);backdrop-filter:blur(20px);border-radius:20px;box-shadow:0 20px 40px rgba(0,0,0,0.2)}.header{background:linear-gradient(135deg,#f59e0b 0%,#d97706 100%);color:#fff;padding:20px;text-align:center}h1{font-size:1.8em;font-weight:900}.content{padding:30px}.input-group{margin-bottom:15px}label{display:block;margin-bottom:8px;font-weight:700;color:#333}input,select{width:100%;padding:15px;border:2px solid #e2e8f0;border-radius:12px;font-size:1.1em;font-weight:500;background:#fff;transition:all .3s}input:focus,select:focus{border-color:#10b981;outline:0;box-shadow:0 0 0 3px rgba(16,185,129,0.2)}button{padding:15px;border:0;border-radius:12px;font-size:1.1em;font-weight:700;cursor:pointer;transition:all .3s;width:100%;margin-bottom:10px}.btn-gen{background:linear-gradient(135deg,#10b981 0%,#059669 100%);color:#fff}.btn-nokos{background:linear-gradient(135deg,#ef4444 0%,#dc2626 100%);color:#fff}.btn:hover{transform:translateY(-2px);box-shadow:0 10px 25px rgba(0,0,0,0.2)}.btn:disabled{opacity:.6;cursor:not-allowed}.loading{display:none;text-align:center;padding:30px}.spinner{width:40px;height:40px;border:4px solid #f3f3f3;border-top:4px solid #667eea;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 15px}@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}.result-qris,.result-nokos{display:none;padding:25px;text-align:center;color:#fff;border-radius:15px;margin-top:15px}.result-qris{background:linear-gradient(135deg,#10b981 0%,#059669 100%)}.result-nokos{background:linear-gradient(135deg,#ef4444 0%,#dc2626 100%)}.total-bayar{font-size:2em;font-weight:900;margin:15px 0}.qris-final{width:250px;height:250px;border:4px solid #fff;border-radius:8px;margin:15px auto;display:block;box-shadow:0 15px 30px rgba(0,0,0,0.3)}.nokos-number{font-size:1.6em;font-weight:900;background:#fff;color:#333;padding:15px;border-radius:12px;margin:10px 0;box-shadow:0 8px 25px rgba(0,0,0,0.2)}.error{color:#ff4444;font-weight:700;padding:15px;background:rgba(255,68,68,0.1);border-radius:12px;margin-top:10px}.section-title{color:#333;margin:25px 0 15px;font-weight:900;border-top:1px solid #eee;padding-top:15px}@media(max-width:480px){.qris-final{width:220px;height:220px}}</style></head><body><div class="container"><div class="header"><h1><i class="fas fa-gem"></i> QRIS + JasaOTP</h1></div><div class="content"><h3 class="section-title">QRIS Payment</h3><div class="input-group"><label><i class="fas fa-money-bill-wave"></i> Nominal</label><input type="number" id="qrisAmount" min="100" placeholder="Min Rp100"></div><button class="btn btn-gen" id="btnQris"><i class="fas fa-qrcode"></i> Generate QRIS</button><div class="loading" id="loadingQris"><div class="spinner"></div>🔄 Generating...</div><div class="result-qris" id="resultQris"></div><button class="btn btn-nokos" id="btnNokos" style="display:none"><i class="fas fa-phone"></i> Buy OTP</button><h3 class="section-title">JasaOTP</h3><div class="input-group"><label><i class="fas fa-globe"></i> Negara</label><select id="negara"><option value="">Pilih...</option></select></div><div class="input-group"><label><i class="fas fa-layer-group"></i> Layanan</label><select id="layanan"><option value="">Pilih...</option></select></div><div class="input-group"><label><i class="fas fa-network-wired"></i> Operator</label><select id="operator"><option value="">Pilih...</option></select></div><div class="loading" id="loadingNokos"><div class="spinner"></div>🔄 Buying...</div><div class="result-nokos" id="resultNokos"></div></div></div><script>const API_KEY='d2c16800b8aba6bafd60499727a16fa9';const API_BASE='https://api.jasaotp.id/v1/';const formatRp=n=>`Rp${n.toLocaleString('id-ID')}`;const randCode=()=>Math.random().toString(36).substr(2,5).toUpperCase();document.addEventListener('DOMContentLoaded',init);async function init(){loadNegara();document.getElementById('qrisAmount').oninput=e=>e.target.value=e.target.value.replace(/\D/g,'');document.getElementById('btnQris').onclick=generateQRIS;document.getElementById('btnNokos').onclick=buyOTP;}async function loadNegara(){try{const res=await fetch(`${API_BASE}negara.php`);const data=await res.json();if(data.success){const s=document.getElementById('negara');data.data.forEach(n=>{const o=document.createElement('option');o.value=n.id_negara;o.text=n.nama_negara.toUpperCase();s.appendChild(o);});s.onchange=handleNegaraChange;}}catch(e){console.error('Negara load error:',e);loadDemoNegara();}}function loadDemoNegara(){const demo=[{id_negara:6,nama_negara:'Indonesia'},{id_negara:0,nama_negara:'Russia'}];const s=document.getElementById('negara');demo.forEach(n=>{const o=document.createElement('option');o.value=n.id_negara;o.text=n.nama_negara.toUpperCase();s.appendChild(o);});s.onchange=handleNegaraChange;}async function handleNegaraChange(){const negaraId=this.value;if(!negaraId)return;const nl=document.getElementById('layanan'),no=document.getElementById('operator');nl.innerHTML='<option>Loading...</option>';no.innerHTML='<option>Loading...</option>';try{const [layRes,opRes]=await Promise.all([fetch(`${API_BASE}layanan.php?negara=${negaraId}`),fetch(`${API_BASE}operator.php?negara=${negaraId}`)]);const layData=await layRes.json(),opData=await opRes.json();loadLayanan(layData,nl);loadOperator(opData[negaraId],no);}catch(e){console.error('Load error:',e);setTimeout(()=>{nl.innerHTML='<option>Pilih...</option>';no.innerHTML='<option>Pilih...</option>';},1000);}}function loadLayanan(data,select){select.innerHTML='<option>Pilih...</option>';if(data&&typeof data==='object'){Object.entries(data).forEach(([k,v])=>{const o=document.createElement('option');o.value=k;o.text=`${v.layanan} (${formatRp(v.harga)})`;select.appendChild(o);});}}function loadOperator(data,select){select.innerHTML='<option>Pilih...</option>';if(Array.isArray(data)){data.forEach(op=>{const o=document.createElement('option');o.value=o.text=op.toUpperCase();select.appendChild(o);});}}async function generateQRIS(){const btn=document.getElementById('btnQris'),amt=parseInt(document.getElementById('qrisAmount').value);if(!amt||amt<100){alert('Min Rp100!');return;}btn.disabled=true;btn.innerHTML='<i class="fas fa-spinner fa-spin"></i> Loading...';document.getElementById('loadingQris').style.display='block';document.getElementById('resultQris').style.display='none';try{await new Promise(r=>setTimeout(r,1500));const total=amt+Math.floor(Math.random()*3000)+2000;showQRIS(total);document.getElementById('btnNokos').style.display='block';}finally{btn.disabled=false;btn.innerHTML='<i class="fas fa-qrcode"></i> Generate QRIS';document.getElementById('loadingQris').style.display='none';}}function showQRIS(total){const id=`QRIS-${randCode()}`,fee=total-parseInt(document.getElementById('qrisAmount').value);document.getElementById('resultQris').innerHTML=`<div class="total-bayar">${formatRp(total)}</div><div>ID: ${id} | Fee: ${formatRp(fee)}</div><img src="https://api.qrispy.id/qris.png" class="qris-final" style="filter:drop-shadow(0 10px 20px rgba(255,0,0,0.3))"><div style="margin-top:15px;padding:15px;background:rgba(255,255,255,0.2);border-radius:12px">Scan → Bayar → Buy OTP</div>`;document.getElementById('resultQris').style.display='block';}async function buyOTP(){const btn=document.getElementById('btnNokos'),negara=document.getElementById('negara').value,layanan=document.getElementById('layanan').value,operator=document.getElementById('operator').value;if(!negara||!layanan||!operator){alert('Pilih semua field!');return;}btn.disabled=true;btn.innerHTML='<i class="fas fa-spinner fa-spin"></i> Ordering...';document.getElementById('loadingNokos').style.display='block';document.getElementById('resultNokos').style.display='none';try{const res=await fetch(`${API_BASE}order.php?api_key=${API_KEY}&negara=${negara}&layanan=${layanan}&operator=${operator}`);const data=await res.json();if(data.success){showNokos(data.data);checkOTP(data.data.order_id);}else throw data.message;}catch(e){document.getElementById('resultNokos').innerHTML=`<div class="error"><i class="fas fa-exclamation-triangle"></i> Error: ${e}</div>`;document.getElementById('resultNokos').style.display='block';}finally{btn.disabled=false;btn.innerHTML='<i class="fas fa-phone"></i> Buy OTP';document.getElementById('loadingNokos').style.display='none';}}function showNokos(data){document.getElementById('resultNokos').innerHTML=`<div class="nokos-number"><i class="fas fa-phone"></i> ${data.number}</div><div style="font-size:1.1em;margin:10px 0">Order ID: ${data.order_id}<br>⏳ Menunggu SMS...</div>`;document.getElementById('resultNokos').style.display='block';}async function checkOTP(orderId){const int=setInterval(async()=>{try{const res=await fetch(`${API_BASE}sms.php?api_key=${API_KEY}&id=${orderId}`);const data=await res.json();if(data.success&&data.data.otp){clearInterval(int);document.getElementById('resultNokos').innerHTML=`<div class="nokos-number"><i class="fas fa-check-circle" style="color:#10b981"></i> ${data.data.otp}</div><div style="font-size:1.1em">✅ OTP Siap! | Order: ${orderId}</div>`;}else if(!data.success){clearInterval(int);}}catch(e){console.error('Check OTP error:',e);}},3000);}</script></body></html>
