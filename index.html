<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QRIS GENERATOR</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #ff6b6b, #feca57);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2em;
            margin-bottom: 5px;
        }

        .content {
            padding: 40px;
        }

        .form-section {
            background: #f8f9fa;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 18px;
            border: 2px solid #e1e5e9;
            border-radius: 12px;
            font-size: 18px;
            margin-bottom: 20px;
            text-align: center;
        }

        .btn-generate {
            width: 100%;
            padding: 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-generate:hover:not(:disabled) {
            transform: translateY(-2px);
        }

        .btn-generate:disabled {
            opacity: 0.6;
        }

        .qris-result {
            text-align: center;
            padding: 30px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border-radius: 15px;
            color: white;
            display: none;
            margin-top: 20px;
        }

        .qris-result.paid {
            background: linear-gradient(135deg, #56ab2f, #a8e6cf) !important;
            animation: bounce 0.6s;
        }

        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .qris-img {
            max-width: 100%;
            height: 250px;
            object-fit: contain;
            border-radius: 12px;
            margin: 20px 0;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .best-fee {
            background: rgba(255,215,0,0.2);
            border: 2px solid #ffd700;
            padding: 15px;
            border-radius: 12px;
            margin: 15px 0;
        }

        .fee-info {
            font-size: 22px;
            font-weight: bold;
            color: #ffd700;
            margin-bottom: 10px;
        }

        .status {
            padding: 12px 24px;
            background: rgba(255,193,7,0.3);
            color: #856404;
            border-radius: 25px;
            font-weight: bold;
            display: inline-block;
            margin: 15px 0;
        }

        .status.paid {
            background: rgba(40,167,69,0.4);
            color: white;
        }

        .loading {
            text-align: center;
            padding: 60px;
            display: none;
        }

        .spinner {
            border: 5px solid #f3f3f3;
            border-top: 5px solid #667eea;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
            margin: 0 auto 25px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .actions {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }

        .btn-action {
            flex: 1;
            padding: 12px;
            background: rgba(255,255,255,0.9);
            color: #333;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-action:hover {
            background: white;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>QRIS GENERATOR</h1>
            <p>Auto Termurah dari 6x Generate</p>
        </div>

        <div class="content">
            <div class="form-section">
                <input type="number" id="amount" placeholder="Nominal">
                <button class="btn-generate" onclick="generateBest()">GENERATE TERMUrah</button>
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p id="loadingText">Cek 6x API...</p>
            </div>

            <div class="qris-result" id="qrisResult">
                <div class="best-fee">
                    <div class="fee-info" id="bestFee">Rp0</div>
                    <div>Admin Fee TERMUrah!</div>
                </div>
                <img id="qrisImg" class="qris-img" src="">
                <div id="amountDisplay"></div>
                <div class="status pending" id="status">Pending</div>
                
                <div class="actions">
                    <button class="btn-action" onclick="copyLink()">📋 Copy Link</button>
                    <button class="btn-action" onclick="downloadImg()">⬇️ Download</button>
                    <button class="btn-action" onclick="checkNow()">🔍 Check</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_TOKEN = 'cki_MDT3cC14ASTcV9yCcZOEOROZFqVgNvZlWjsC5ofjrp3x2DBe';
        const API_URL = 'https://api.qrispy.id';
        let bestQRIS = null;

        function formatRupiah(n) {
            return new Intl.NumberFormat('id-ID').format(n);
        }

        // ✅ GENERATE 6x & PILIH TERMUrah SAJA
        async function generateBest() {
            const amount = parseInt(document.getElementById('amount').value) || 0;
            
            const btn = document.querySelector('.btn-generate');
            const loading = document.getElementById('loading');
            const result = document.getElementById('qrisResult');

            btn.disabled = true;
            btn.textContent = 'Cek 6x...';
            loading.style.display = 'block';
            result.style.display = 'none';

            try {
                document.getElementById('loadingText').textContent = 'Generate 1/6...';
                
                // ✅ TRY 6x RAPID FIRE
                let candidates = [];
                for (let i = 0; i < 6; i++) {
                    try {
                        document.getElementById('loadingText').textContent = `Try ${i+1}/6...`;
                        
                        const res = await fetch(`${API_URL}/api/payment/qris/generate`, {
                            method: 'POST',
                            headers: {
                                'X-API-Token': API_TOKEN,
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({amount})
                        });
                        
                        const data = await res.json();
                        if (data.status === 'success') {
                            const adminFee = data.data.admin_fee || 999999;
                            candidates.push({ ...data.data, adminFee, tryIndex: i });
                        }
                        
                        // Delay kecil antar try
                        await new Promise(r => setTimeout(r, 200));
                        
                    } catch(e) {
                        console.log(`Try ${i+1} failed`);
                    }
                }

                // ✅ SORT & AMBIL TERMUrah
                if (candidates.length === 0) {
                    throw new Error('Tidak ada QRIS berhasil');
                }
                
                candidates.sort((a, b) => a.adminFee - b.adminFee);
                bestQRIS = candidates[0]; // ✅ PILIH #1 TERMUrah
                
                displayBestQRIS();
                startMonitoring();

            } catch(e) {
                alert('Gagal: ' + e.message);
            } finally {
                btn.disabled = false;
                btn.textContent = 'GENERATE TERMUrah';
                loading.style.display = 'none';
            }
        }

        function displayBestQRIS() {
            const result = document.getElementById('qrisResult');
            document.getElementById('bestFee').textContent = `Rp${bestQRIS.adminFee}`;
            document.getElementById('qrisImg').src = bestQRIS.qris_image_url;
            document.getElementById('amountDisplay').textContent = formatRupiah(bestQRIS.amount);
            document.getElementById('status').textContent = 'Pending';
            document.getElementById('status').className = 'status pending';
            
            result.style.display = 'block';
            result.scrollIntoView({behavior: 'smooth'});
        }

        let monitorInterval;
        function startMonitoring() {
            let checks = 0;
            monitorInterval = setInterval(async () => {
                checks++;
                try {
                    const res = await fetch(`${API_URL}/api/payment/qris/${bestQRIS.qris_id}/status`, {
                        headers: {'X-API-Token': API_TOKEN}
                    });
                    const data = await res.json();
                    
                    const statusEl = document.getElementById('status');
                    
                    if (data.status === 'paid') {
                        statusEl.textContent = 'PAID ✅';
                        statusEl.className = 'status paid';
                        document.querySelector('.qris-result').classList.add('paid');
                        clearInterval(monitorInterval);
                        alert(`🎉 PAID! Admin fee: Rp${bestQRIS.adminFee}`);
                        return;
                    } else if (data.status === 'expired') {
                        statusEl.textContent = 'Expired';
                        statusEl.className = 'status';
                        clearInterval(monitorInterval);
                        return;
                    }
                } catch(e) {}
                
                if (checks > 20) clearInterval(monitorInterval);
            }, 8000);
        }

        function copyLink() {
            navigator.clipboard.writeText(bestQRIS.qris_image_url);
            alert('✅ Link QRIS dicopy!');
        }

        function downloadImg() {
            const a = document.createElement('a');
            a.href = bestQRIS.qris_image_url;
            a.download = `qris-${bestQRIS.qris_id.slice(-6)}.png`;
            a.click();
        }

        async function checkNow() {
            document.getElementById('loadingText').textContent = 'Checking...';
            document.getElementById('loading').style.display = 'block';
            await fetch(`${API_URL}/api/payment/qris/${bestQRIS.qris_id}/status`, {
                headers: {'X-API-Token': API_TOKEN}
            });
            document.getElementById('loading').style.display = 'none';
        }

        document.getElementById('amount').addEventListener('input', function(e) {
            e.target.value = e.target.value.replace(/\D/g, '');
        });

        document.addEventListener('keypress', e => {
            if (e.key === 'Enter') generateBest();
        });
    </script>
</body>
</html>
