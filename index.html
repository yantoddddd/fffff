<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QRIS Auto Gen</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;padding:20px}
.container{max-width:600px;margin:0 auto;background:white;border-radius:20px;box-shadow:0 20px 40px rgba(0,0,0,.1)}
.header{background:linear-gradient(135deg,#ff6b6b,#feca57);color:white;padding:25px;text-align:center;border-radius:20px 20px 0 0}
h1{font-size:2em;margin:0}
.content{padding:30px}
label{display:block;margin-bottom:10px;font-weight:600}
input{width:100%;padding:15px;border:2px solid #ddd;border-radius:10px;font-size:18px}
.btn-group{display:grid;grid-template-columns:1fr 1fr;gap:15px;margin:20px 0}
button{padding:15px;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer}
.btn-gen{background:linear-gradient(135deg,#667eea,#764ba2);color:white}
.btn-stop{background:linear-gradient(135deg,#f39c12,#e67e22);color:white}
.btn-cancel{background:linear-gradient(135deg,#ff416c,#ff4b2b);color:white}
button:hover{transform:translateY(-2px)}
button:disabled{opacity:.6;cursor:not-allowed}
.qris-result{padding:30px;text-align:center;background:linear-gradient(135deg,#f093fb,#f5576c);color:white;border-radius:20px;display:none;margin-top:20px}
.status-paid{background:linear-gradient(135deg,#56ab2f,#a8e6cf)!important}
.qris-img{max-width:280px;width:100%;border-radius:15px;margin:20px auto;display:block}
.info{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;margin:20px 0}
.info-item{background:rgba(255,255,255,.3);padding:10px 20px;border-radius:25px;font-size:15px}
.progress-bar{width:100%;height:8px;background:#eee;border-radius:4px;margin:15px 0;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#56ab2f,#a8e6cf);width:0%;transition:width .3s}
.counter{text-align:center;font-size:18px;font-weight:600;color:#333;margin:15px 0}
.loading{display:none;text-align:center;padding:30px}
.spinner{width:50px;height:50px;border:4px solid #f3f3f3;border-top:4px solid #667eea;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 20px}
@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
@media(max-width:600px){.btn-group{grid-template-columns:1fr}.info{flex-direction:column;align-items:center}}
</style>
</head>
<body>
<div class="container">
<div class="header">
<h1>🚀 QRIS Auto Gen</h1>
<p>Auto 5x + Payment Check</p>
</div>
<div class="content">
<div>
<label>💰 Nominal (Rp)</label>
<input type="number" id="amount" min="1000" placeholder="Min Rp1000">
<div class="btn-group">
<button class="btn-gen" onclick="startAuto()">⚡ Auto 5x</button>
<button class="btn-stop" onclick="stopAuto()" id="btnStop" style="display:none">⏹️ Stop</button>
</div>
<div class="progress-bar" id="progress" style="display:none">
<div class="progress-fill" id="progFill"></div>
</div>
<div class="counter" id="counter" style="display:none"></div>
</div>
<div class="loading" id="loading">
<div class="spinner"></div>
<p id="loadingText">Generating...</p>
</div>
<div class="qris-result" id="qrisResult">
<h2 id="title">✅ QRIS #3/4</h2>
<img id="qrisImg" class="qris-img" alt="QRIS">
<div class="info" id="info"></div>
<div style="margin:20px 0">
<button onclick="copyQRIS()" style="background:rgba(255,255,255,.9);color:#333;padding:10px 20px;border-radius:25px;margin:5px;cursor:pointer">📋 Copy</button>
<button onclick="downloadQRIS()" style="background:rgba(255,255,255,.9);color:#333;padding:10px 20px;border-radius:25px;margin:5px;cursor:pointer">⬇️ Download</button>
<button onclick="checkNow()" style="background:rgba(255,255,255,.9);color:#333;padding:10px 20px;border-radius:25px;margin:5px;cursor:pointer">🔄 Cek</button>
</div>
<button class="btn-cancel" onclick="cancelQRIS()" id="btnCancel" style="display:none;width:100%;margin-top:15px">❌ Cancel</button>
</div>
</div>
</div>
<script>
const TOKEN='cki_MDT3cC14ASTcV9yCcZOEOROZFqVgNvZlWjsC5ofjrp3x2DBe';const API='https://api.qrispy.id';let currentQRIS=null;let autoActive=false;let count=0;let interval;
const formatRp=n=>new Intl.NumberFormat('id-ID',{style:'currency',currency:'IDR',minimumFractionDigits:0}).format(n);
async function genQRIS(){const amt=parseInt(document.getElementById('amount').value);if(!amt||amt<1000){alert('Min Rp1000');return null}document.getElementById('loading').style.display='block';document.getElementById('loadingText').textContent=`Gen #${count+1}/5...`;try{const res=await fetch(`${API}/api/payment/qris/generate`,{method:'POST',headers:{'X-API-Token':TOKEN,'Content-Type':'application/json'},body:JSON.stringify({amount:amt})});const data=await res.json();if(data.status==='success'){count++;updateUI();return data.data}else throw data.message}catch(e){alert('Error: '+e);return null}finally{document.getElementById('loading').style.display='none'}}
async function startAuto(){if(autoActive)return;autoActive=true;count=0;document.querySelector('.btn-gen').disabled=true;document.getElementById('btnStop').style.display='block';document.getElementById('progress').style.display='block';document.getElementById('counter').style.display='block';document.getElementById('qrisResult').style.display='none';for(let i=0;i<5;i++){if(!autoActive)break;const qris=await genQRIS();if(qris){currentQRIS=qris;if(count===3||count===4){displayQRIS(qris,count)}}if(count===5){break}}autoActive=false;document.querySelector('.btn-gen').disabled=false;document.getElementById('btnStop').style.display='none';if(count===5&&currentQRIS){startCheck()}}
function stopAuto(){autoActive=false;document.querySelector('.btn-gen').disabled=false;document.getElementById('btnStop').style.display='none';clearInterval(interval)}
function updateUI(){document.getElementById('counter').innerHTML=`✅ <strong>${count}</strong>/5 Generated`;document.getElementById('progFill').style.width=(count/5)*100+'%'}
function displayQRIS(data,num){const res=document.getElementById('qrisResult');document.getElementById('qrisImg').src=data.qris_image_url;document.getElementById('title').textContent=`✅ QRIS #${num}`;document.getElementById('info').innerHTML=`<div class="info-item">💰 ${formatRp(data.amount)}</div><div class="info-item">🆔 ${data.qris_id}</div><div class="info-item">⏰ ${new Date(data.expired_at).toLocaleString('id-ID')}</div>`;res.style.display='block';res.scrollIntoView()}
async function cancelQRIS(){if(!currentQRIS||!confirm('Cancel QRIS?'))return;currentQRIS.status='cancelled';document.getElementById('qrisResult').style.background='linear-gradient(135deg,#95a5a6,#7f8c8d)';document.getElementById('title').textContent='❌ Cancelled';document.getElementById('btnCancel').style.display='none';clearInterval(interval);alert('Cancelled')}
function startCheck(){clearInterval(interval);interval=setInterval(checkStatus,2500)}
async function checkStatus(){if(!currentQRIS)return;try{const res=await fetch(`${API}/api/payment/qris/${currentQRIS.qris_id}/status`,{headers:{'X-API-Token':TOKEN}});const data=await res.json();if(data.status&&data.status!=='pending'){currentQRIS.status=data.status;if(data.status==='paid'){document.getElementById('qrisResult').classList.add('status-paid');document.getElementById('title').textContent='🎉 PAID!';document.getElementById('btnCancel').style.display='none'}clearInterval(interval)}}catch(e){}}
function checkNow(){checkStatus()}
function copyQRIS(){if(currentQRIS)navigator.clipboard.writeText(currentQRIS.qris_image_url).then(()=>alert('Copied!'))}
function downloadQRIS(){if(currentQRIS){const a=document.createElement('a');a.href=currentQRIS.qris_image_url;a.download=`qris-${currentQRIS.qris_id}.png`;a.click()}}
document.getElementById('amount').addEventListener('input',e=>{e.target.value=e.target.value.replace(/\D/g,'')});
document.addEventListener('keypress',e=>{if(e.key==='Enter')startAuto()});
</script>
</body>
</html>
