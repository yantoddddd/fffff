<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top Up & Payment - QRIS Dinamis</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 10px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 25px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #ff6b6b, #feca57);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.2em;
            margin-bottom: 5px;
        }

        .content {
            padding: 30px;
        }

        .category-tabs {
            display: flex;
            background: #f8f9fa;
            border-radius: 15px;
            padding: 5px;
            margin-bottom: 25px;
            overflow-x: auto;
        }

        .tab-btn {
            flex: 1;
            padding: 15px;
            border: none;
            background: transparent;
            font-weight: 600;
            cursor: pointer;
            border-radius: 12px;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-bottom: 25px;
        }

        .product-card {
            background: #f8f9fa;
            border: 2px solid transparent;
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .product-card:hover, .product-card.active {
            border-color: #667eea;
            background: white;
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(102,126,234,0.2);
        }

        .product-card img {
            width: 50px;
            height: 50px;
            margin-bottom: 8px;
        }

        .product-name {
            font-size: 12px;
            margin-bottom: 5px;
        }

        .product-price {
            font-weight: bold;
            color: #333;
            font-size: 14px;
        }

        .form-section {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        input, select {
            width: 100%;
            padding: 15px;
            border: 2px solid #e1e5e9;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn-generate, .btn-cancel {
            padding: 18px;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-generate {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-generate:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102,126,234,0.4);
        }

        .btn-cancel {
            background: linear-gradient(135deg, #ff416c, #ff4b2b);
            color: white;
        }

        .qris-result {
            text-align: center;
            padding: 30px;
            background: linear-gradient(135deg, #56ab2f, #a8e6cf);
            border-radius: 20px;
            color: white;
            display: none;
            margin-top: 20px;
        }

        .qris-image {
            max-width: 280px;
            width: 100%;
            border-radius: 15px;
            margin: 20px auto;
        }

        .btn-action {
            background: rgba(255,255,255,0.9);
            color: #333;
            border: none;
            padding: 12px 20px;
            margin: 5px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
        }

        .loading {
            text-align: center;
            padding: 30px;
            display: none;
        }

        @media (max-width: 480px) {
            .product-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚡ Top Up Instan</h1>
            <p>Pulsa, Game, E-Wallet - QRIS Payment</p>
        </div>

        <div class="content">
            <div class="category-tabs">
                <button class="tab-btn active" onclick="switchCategory('pulsa')">📱 Pulsa</button>
                <button class="tab-btn" onclick="switchCategory('game')">🎮 Game</button>
                <button class="tab-btn" onclick="switchCategory('ewallet')">💳 E-Wallet</button>
                <button class="tab-btn" onclick="switchCategory('paket')">📦 Paket Data</button>
            </div>

            <div class="product-grid" id="productGrid">
                <!-- Products akan di-generate JS -->
            </div>

            <div class="form-section">
                <div class="form-group">
                    <label>📝 No HP / ID</label>
                    <input type="tel" id="customerId" placeholder="08123456789 / Player ID">
                </div>
                <div class="form-group">
                    <label>💰 Nominal</label>
                    <input type="number" id="amount" min="1000" placeholder="Rp 10.000">
                </div>
                <div class="form-group">
                    <label>📋 Catatan</label>
                    <input type="text" id="notes" placeholder="ML ID: Sajaad#1234">
                </div>

                <div class="btn-group">
                    <button class="btn-generate" onclick="generateQRIS()">
                        🎫 Bayar QRIS
                    </button>
                    <button class="btn-cancel" onclick="cancelCurrentQRIS()" id="btnCancel" style="display: none;">
                        ❌ Batal
                    </button>
                </div>
            </div>

            <div class="loading" id="loading">
                <div style="border: 4px solid #f3f3f3; border-top: 4px solid #667eea; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 0 auto 20px;"></div>
                <p>Generating QRIS...</p>
            </div>

            <div class="qris-result" id="qrisResult">
                <h3 id="resultTitle">✅ QRIS Siap Bayar!</h3>
                <img id="qrisImage" class="qris-image" alt="QRIS">
                <div id="qrisInfo" style="margin: 20px 0;">
                    <div style="font-size: 24px; margin-bottom: 15px;">💰 <span id="displayAmount"></span></div>
                    <div style="background: rgba(255,255,255,0.2); padding: 10px 20px; border-radius: 25px; display: inline-block; margin: 5px;">
                        🆔 <span id="qrisId"></span>
                    </div>
                </div>
                <div>
                    <button class="btn-action" onclick="copyQRIS()">📋 Copy Link</button>
                    <button class="btn-action" onclick="downloadQRIS()">⬇️ Download</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_TOKEN = 'cki_MDT3cC14ASTcV9yCcZOEOROZFqVgNvZlWjsC5ofjrp3x2DBe';
        const API_URL = 'https://api.qrispy.id';
        let currentQRIS = null;
        let currentProduct = null;

        const products = {
            pulsa: [
                { name: 'Telkomsel 5K', price: 5500, img: '📡' },
                { name: 'Telkomsel 10K', price: 10500, img: '📡' },
                { name: 'Telkomsel 20K', price: 20500, img: '📡' },
                { name: 'XL 10K', price: 10500, img: '📶' },
                { name: 'XL 20K', price: 20500, img: '📶' },
                { name: 'Indosat 10K', price: 10500, img: '📵' }
            ],
            game: [
                { name: 'ML Diamond 17', price: 15000, img: '⚔️' },
                { name: 'ML Diamond 38', price: 30000, img: '⚔️' },
                { name: 'ML Diamond 73', price: 55000, img: '⚔️' },
                { name: 'FF Diamond 50', price: 15000, img: '🔫' },
                { name: 'FF Diamond 100', price: 28000, img: '🔫' },
                { name: 'PUBG UC 60', price: 15000, img: '🎮' }
            ],
            ewallet: [
                { name: 'Dana 10K', price: 10500, img: '💳' },
                { name: 'Dana 25K', price: 25500, img: '💳' },
                { name: 'Dana 50K', price: 50500, img: '💳' },
                { name: 'Gopay 10K', price: 10500, img: '💳' },
                { name: 'OVO 10K', price: 10500, img: '💳' }
            ],
            paket: [
                { name: 'Telkomsel 2GB', price: 15000, img: '📱' },
                { name: 'Telkomsel 5GB', price: 35000, img: '📱' },
                { name: 'XL 3GB', price: 25000, img: '📱' },
                { name: 'Indosat 2GB', price: 18000, img: '📱' }
            ]
        };

        function switchCategory(category) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            const grid = document.getElementById('productGrid');
            grid.innerHTML = products[category].map(product => `
                <div class="product-card ${currentProduct?.name === product.name ? 'active' : ''}" onclick="selectProduct('${category}', '${product.name}', ${product.price})">
                    <div>${product.img}</div>
                    <div class="product-name">${product.name}</div>
                    <div class="product-price">Rp ${product.price.toLocaleString()}</div>
                </div>
            `).join('');
        }

        function selectProduct(category, name, price) {
            currentProduct = { category, name, price };
            document.querySelectorAll('.product-card').forEach(card => card.classList.remove('active'));
            event.target.classList.add('active');
            
            document.getElementById('amount').value = price;
            document.getElementById('notes').placeholder = `${name} - ${category}`;
        }

        function formatRupiah(angka) {
            return new Intl.NumberFormat('id-ID').format(angka);
        }

        async function generateQRIS() {
            const amount = parseInt(document.getElementById('amount').value);
            const customerId = document.getElementById('customerId').value;
            const notes = document.getElementById('notes').value || currentProduct?.name || '';

            if (!amount || amount < 1000) {
                alert('⚠️ Minimal Rp1.000!');
                return;
            }

            const btnGenerate = document.querySelector('.btn-generate:not(.btn-cancel)');
            const btnCancel = document.getElementById('btnCancel');
            const loading = document.getElementById('loading');

            btnGenerate.disabled = true;
            btnCancel.style.display = 'none';
            loading.style.display = 'block';

            try {
                const body = { 
                    amount,
                    payment_reference: notes ? `${customerId || 'Cust'} - ${notes}`.substring(0, 50) : undefined
                };

                const response = await fetch(`${API_URL}/api/payment/qris/generate`, {
                    method: 'POST',
                    headers: {
                        'X-API-Token': API_TOKEN,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(body)
                });

                const data = await response.json();

                if (data.status === 'success') {
                    currentQRIS = data.data;
                    displayQRIS(data.data, notes);
                    btnCancel.style.display = 'block';
                } else {
                    throw new Error(data.message || 'Gagal generate QRIS');
                }
            } catch (error) {
                alert('❌ Error: ' + error.message);
            } finally {
                btnGenerate.disabled = false;
                loading.style.display = 'none';
            }
        }

        function displayQRIS(qrisData, notes) {
            document.getElementById('qrisResult').style.display = 'block';
            document.getElementById('qrisImage').src = qrisData.qris_image_url;
            document.getElementById('resultTitle').textContent = `✅ Bayar ${notes || 'Pesanan'}`;
            document.getElementById('displayAmount').textContent = formatRupiah(qrisData.amount);
            document.getElementById('qrisId').textContent = qrisData.qris_id;
            document.getElementById('qrisResult').scrollIntoView({ behavior: 'smooth' });
        }

        function cancelCurrentQRIS() {
            if (confirm('❌ Batalkan pembayaran ini?')) {
                document.getElementById('btnCancel').style.display = 'none';
                document.getElementById('qrisResult').style.display = 'none';
                currentQRIS = null;
                alert('✅ Dibatalkan! Siap buat QRIS baru.');
            }
        }

        function copyQRIS() {
            navigator.clipboard.writeText(currentQRIS.qris_image_url).then(() => {
                alert('✅ Link QRIS dicopy!');
            });
        }

        function downloadQRIS() {
            const link = document.createElement('a');
            link.href = currentQRIS.qris_image_url;
            link.download = `qris-${currentQRIS.qris_id}.png`;
            link.click();
        }

        // Init
        switchCategory('pulsa');
        document.getElementById('amount').addEventListener('input', function(e) {
            e.target.value = e.target.value.replace(/\D/g, '');
        });
    </script>
</body>
</html>
